<template id="createCategoryModalTemplate">
  <form class="space-y-4" onsubmit="submitCreateCategory(event)">
    <input
      id="categoryName"
      type="text"
      placeholder="Category name"
      class="w-full border p-3 rounded"
      required
    />
    <textarea
      id="categoryDescription"
      placeholder="Description (optional)"
      class="w-full border p-3 rounded"
      rows="3"
    ></textarea>
    <button type="submit" class="bg-blue-600 text-white px-4 py-3 rounded w-full">
      Save Category
    </button>
  </form>
</template>

<template id="editCategoryModalTemplate">
  <form class="space-y-4" onsubmit="Edit.submit(event)">
    <input
      id="editCategoryId"
      type="hidden"
    />
    <input
      id="editCategoryName"
      type="text"
      placeholder="Category name"
      class="w-full border p-3 rounded"
      required
    />
    <textarea
      id="editCategoryDescription"
      placeholder="Description (optional)"
      class="w-full border p-3 rounded"
      rows="3"
    ></textarea>
    <button type="submit" class="bg-blue-600 text-white px-4 py-3 rounded w-full">
      Update Category
    </button>
  </form>
</template>
