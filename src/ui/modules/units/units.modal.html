<template id="createUnitModalTemplate">
  <form class="form" onsubmit="submitCreateUnit(event)">
    <div class="form-group">
      <label for="unitName" class="form-label">Unit Name</label>
      <input
        id="unitName"
        type="text"
        placeholder="Unit name (e.g. Kilogram)"
        class="form-input"
        required
      />
    </div>
    <div class="form-group">
      <label for="unitSymbol" class="form-label">Symbol</label>
      <input
        id="unitSymbol"
        type="text"
        placeholder="Symbol (e.g. kg)"
        class="form-input"
        required
      />
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn--secondary" onclick="closeModal()">Cancel</button>
      <button type="submit" class="btn btn--primary btn--lg btn--full">
        Save Unit
      </button>
    </div>
  </form>
</template>

<template id="editUnitModalTemplate">
  <form class="form" onsubmit="Edit.submit(event)">
    <input
      id="editUnitId"
      type="hidden"
    />
    <div class="form-group">
      <label for="editUnitName" class="form-label">Unit Name</label>
      <input
        id="editUnitName"
        type="text"
        placeholder="Unit name"
        class="form-input"
        required
      />
    </div>
    <div class="form-group">
      <label for="editUnitSymbol" class="form-label">Symbol</label>
      <input
        id="editUnitSymbol"
        type="text"
        placeholder="Symbol"
        class="form-input"
        required
      />
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn--secondary" onclick="closeModal()">Cancel</button>
      <button type="submit" class="btn btn--primary btn--lg btn--full">
        Update Unit
      </button>
    </div>
  </form>
</template>
