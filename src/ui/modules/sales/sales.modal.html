<div id="salesModalContent" class="hidden">
  <div class="receipt">
    <div class="receipt__header">
      <div class="receipt__field">
        <span class="receipt__label">Invoice</span>
        <span id="modal-invoice" class="receipt__value">-</span>
      </div>
      <div class="receipt__field">
        <span class="receipt__label">Customer</span>
        <span id="modal-customer" class="receipt__value">-</span>
      </div>
      <div class="receipt__field">
        <span class="receipt__label">Date</span>
        <span id="modal-date" class="receipt__value">-</span>
      </div>
      <div class="receipt__field">
        <span class="receipt__label">Payment</span>
        <span id="modal-payment" class="receipt__value">-</span>
      </div>
    </div>
    
    <div class="receipt__items">
      <h4 class="receipt__section-title">Items</h4>
      <table class="receipt__table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Subtotal</th>
          </tr>
        </thead>
        <tbody id="modal-items-body">
          <!-- Rendered here -->
        </tbody>
      </table>
    </div>
    
    <div class="receipt__totals">
      <div class="receipt__total-row">
        <span class="receipt__total-label">Total</span>
        <span id="modal-total" class="receipt__total-value">KES 0.00</span>
      </div>
    </div>
    
    <div class="receipt__actions">
      <button class="btn btn--primary" onclick="printCurrentReceipt()">Print Receipt</button>
      <button class="btn btn--secondary" onclick="Modal.close()">Close</button>
    </div>
  </div>
</div>
