<template id="createProductModalTemplate">
  <form class="space-y-4" onsubmit="submitCreateProduct(event)">
    <input
      id="productName"
      type="text"
      placeholder="Product name"
      class="w-full border p-3 rounded"
      required
    />
    <input
      id="sellPrice"
      type="number"
      placeholder="Sell price"
      class="w-full border p-3 rounded"
      required
    />
    <input
      id="buyPrice"
      type="number"
      placeholder="Buy price"
      class="w-full border p-3 rounded"
      required
    />
    <input
      id="stockQty"
      type="number"
      placeholder="Opening stock"
      class="w-full border p-3 rounded"
      required
    />
    <select id="unitSelect" class="w-full border p-3 rounded">
      <option value="">Loading units...</option>
    </select>
    <button type="submit" class="bg-blue-600 text-white px-4 py-3 rounded w-full">
      Save Product
    </button>
  </form>
</template>
