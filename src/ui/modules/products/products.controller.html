<script>

async function openCreateProductModal() {
  const template = document.getElementById("createProductModalTemplate");
  openModal(template.innerHTML);
  await loadUnitsDropdown();
}

async function loadUnitsDropdown() {
  const raw = await api("GET_UNITS");
  const response = typeof raw === "string" ? JSON.parse(raw) : raw;

  const select = document.getElementById("unitSelect");
  if (!response.success || !response.data.length) {
    select.innerHTML = '<option value="">No units available</option>';
    return;
  }

  select.innerHTML = response.data.map(unit => `
    <option value="${unit.id}">
      ${unit.name} (${unit.symbol})
    </option>
  `).join("");
}

async function submitCreateProduct(e) {
  e.preventDefault();

  const submitBtn = e.target.querySelector('button[type="submit"]');
  
  // Guard against null submitBtn
  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving...';
  }

  const payload = {
    name: document.getElementById("productName").value,
    buy_price: Number(document.getElementById("buyPrice").value),
    sell_price: Number(document.getElementById("sellPrice").value),
    stock: Number(document.getElementById("stockQty").value),
    unit_id: document.getElementById("unitSelect").value
  };

  try {
    const raw = await api("CREATE_PRODUCT", { data: payload });
    const response = typeof raw === "string" ? JSON.parse(raw) : raw;

    if (!response || !response.success) {
      showToast(response?.error || "Failed to create product", 'error');
      return;
    }

    closeModal();
    showToast('Product created successfully', 'success');
    await loadProducts();
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  } finally {
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Save Product';
    }
  }
}

</script>
