<script>
/**
 * PaymentModal — Handles payment UI using method registry pattern
 * 
 * Supports multiple payment methods registered via PaymentMethodRegistry.
 * Each method handler implements:
 * - renderSection() → HTML string
 * - onSelect() → called when method is selected
 * - validate() → throws error if invalid
 * - getPaymentData() → returns { method, amountPaid, customerId, notes }
 * 
 * Built-in handlers: cash, mpesa, credit, split
 * Extend by registering new handlers in PaymentMethodRegistry
 */
const PaymentModal = {
  
  /**
   * Initialize modal when shown
   */
  init() {
    const total = CartState.summary.total;
    
    const totalEl = document.getElementById("payment-total");
    const itemCountEl = document.getElementById("payment-item-count");
    const summaryTotalEl = document.getElementById("payment-summary-total");
    
    if (totalEl) totalEl.textContent = PricingService.formatCurrency(total);
    if (itemCountEl) itemCountEl.textContent = CartState.getTotalQuantity();
    if (summaryTotalEl) summaryTotalEl.textContent = PricingService.formatCurrency(total);
    
    // Reset loading state
    this._setLoading(false);
    
    // Render payment methods dynamically
    this._renderPaymentMethods();
    
    // Reset amount - PREFILL with total amount
    const amountInput = document.getElementById("payment-amount");
    if (amountInput) {
      amountInput.value = total.toFixed(2);
      amountInput.disabled = false;
      setTimeout(() => amountInput.focus(), 100);
    }
    
    // Reset change display
    const changeDisplay = document.getElementById("change-display");
    if (changeDisplay) changeDisplay.style.display = "none";
    
    // Reset credit section
    const creditSection = document.getElementById("credit-section");
    if (creditSection) creditSection.style.display = "none";
    
    // Reset split section
    const splitSection = document.getElementById("split-section");
    if (splitSection) splitSection.style.display = "none";
    
    // Clear any existing splits
    CartState.clearSplits();
    
    // Set default method
    this.setMethod("cash");
    
    // Trigger amount change to update UI
    this.onAmountChange();
  },
  
  /**
   * Render payment method buttons dynamically
   */
  _renderPaymentMethods() {
    const container = document.getElementById("payment-method-options");
    if (!container) return;
    
    const methods = PaymentMethodRegistry.getAll();
    
    container.innerHTML = methods.map(method => `
      <button class="payment-method-btn" data-method="${method.id}" onclick="PaymentModal.setMethod('${method.id}')">
        <span class="payment-method-icon">${method.icon}</span>
        <span class="payment-method-label">${method.label}</span>
      </button>
    `).join("");
  },
  
  /**
   * Set payment method
   */
  setMethod(methodId) {
    CartState.payment.method = methodId;
    
    // Update UI
    document.querySelectorAll(".payment-method-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.method === methodId);
    });
    
    // Call handler's onSelect
    const handler = PaymentMethodRegistry.get(methodId);
    if (handler && handler.onSelect) {
      handler.onSelect();
    }
    
    // Update change and button state
    this.onAmountChange();
  },
  
  /**
   * Calculate change on input
   */
  onAmountChange() {
    const amountInput = document.getElementById("payment-amount");
    const amount = Number(amountInput ? amountInput.value : 0) || 0;
    
    CartState.payment.amountPaid = amount;
    
    const total = CartState.summary.total;
    const change = CheckoutService.calculateChange(amount);
    const changeDisplay = document.getElementById("change-display");
    const changeAmount = document.getElementById("change-amount");
    
    if (change > 0) {
      if (changeDisplay) changeDisplay.style.display = "block";
      if (changeAmount) changeAmount.textContent = PricingService.formatCurrency(change);
    } else {
      if (changeDisplay) changeDisplay.style.display = "none";
    }
    
    // Enable/disable confirm button
    const confirmBtn = document.getElementById("confirm-payment-btn");
    if (confirmBtn) {
      const handler = PaymentMethodRegistry.get(CartState.payment.method);
      if (handler && handler.validate) {
        try {
          handler.validate();
          confirmBtn.disabled = false;
        } catch (e) {
          confirmBtn.disabled = true;
        }
      } else {
        confirmBtn.disabled = amount < total;
      }
    }
  },
  
  /**
   * Set loading state
   */
  _setLoading(isLoading) {
    const confirmBtn = document.getElementById("confirm-payment-btn");
    const loadingOverlay = document.getElementById("payment-loading-overlay");
    
    if (confirmBtn) {
      confirmBtn.disabled = isLoading;
      confirmBtn.textContent = isLoading ? "Processing..." : "Complete Sale";
    }
    
    if (loadingOverlay) {
      loadingOverlay.style.display = isLoading ? "flex" : "none";
    }
  },
  
  /**
   * Confirm payment and process checkout
   */
  async confirm() {
    try {
      // Validate payment
      const handler = PaymentMethodRegistry.get(CartState.payment.method);
      if (handler && handler.validate) {
        handler.validate();
      }
      
      // Show loading state
      this._setLoading(true);
      
      // Get payment data from handler
      let paymentData;
      if (handler && handler.getPaymentData) {
        paymentData = handler.getPaymentData();
      } else {
        // Fallback for methods without handler
        paymentData = {
          method: CartState.payment.method,
          amountPaid: Number(document.getElementById("payment-amount").value) || 0,
          customerId: null
        };
      }
      
      await CheckoutService.process(paymentData);
      
      Modal.close();
      
    } catch (error) {
      this._setLoading(false);
      Toast.error(error.message || "Payment failed");
    }
  }
};

/**
 * Cash Payment Handler
 */
PaymentMethodRegistry.register('cash', {
  id: 'cash',
  label: 'Cash',
  icon: '💰',
  requiresAmount: true,
  
  onSelect() {
    const cashSection = document.getElementById("cash-input-section");
    const creditSection = document.getElementById("credit-section");
    const splitSection = document.getElementById("split-section");
    const amountInput = document.getElementById("payment-amount");
    const total = CartState.summary.total;
    
    if (cashSection) cashSection.style.display = "block";
    if (creditSection) creditSection.style.display = "none";
    if (splitSection) splitSection.style.display = "none";
    
    if (amountInput) {
      amountInput.value = total.toFixed(2);
      amountInput.disabled = false;
    }
  },
  
  validate() {
    const amount = Number(document.getElementById("payment-amount").value) || 0;
    const total = CartState.summary.total;
    
    if (amount < total) {
      throw new Error(`Insufficient payment. Total is ${PricingService.formatCurrency(total)}, but received ${PricingService.formatCurrency(amount)}`);
    }
  },
  
  getPaymentData() {
    return {
      method: 'cash',
      amountPaid: Number(document.getElementById("payment-amount").value) || 0,
      customerId: null
    };
  }
});

/**
 * M-Pesa Payment Handler
 */
PaymentMethodRegistry.register('mpesa', {
  id: 'mpesa',
  label: 'M-Pesa',
  icon: '📱',
  requiresAmount: false,
  
  onSelect() {
    const cashSection = document.getElementById("cash-input-section");
    const creditSection = document.getElementById("credit-section");
    const splitSection = document.getElementById("split-section");
    const amountInput = document.getElementById("payment-amount");
    const total = CartState.summary.total;
    
    if (cashSection) cashSection.style.display = "none";
    if (creditSection) creditSection.style.display = "none";
    if (splitSection) splitSection.style.display = "none";
    
    // Auto-set amount to total
    CartState.payment.amountPaid = total;
    if (amountInput) {
      amountInput.value = total.toFixed(2);
      amountInput.disabled = true;
    }
    
    // Show M-Pesa phone input
    const mpesaSection = document.getElementById("mpesa-input-section");
    if (mpesaSection) mpesaSection.style.display = "block";
  },
  
  validate() {
    const phoneInput = document.getElementById("mpesa-phone");
    if (!phoneInput || !phoneInput.value) {
      throw new Error("Please enter M-Pesa phone number");
    }
    // Basic validation: must start with 254 or 07...
    const phone = phoneInput.value.replace(/\s/g, '');
    if (!/^(254|0)[17]\d{8}$/.test(phone)) {
      throw new Error("Invalid phone number format. Use 254XXXXXXXXX or 07XXXXXXXX");
    }
  },
  
  getPaymentData() {
    const phoneInput = document.getElementById("mpesa-phone");
    return {
      method: 'mpesa',
      amountPaid: CartState.summary.total,
      customerId: null,
      phone: phoneInput ? phoneInput.value : ''
    };
  }
});

/**
 * Credit Payment Handler
 */
PaymentMethodRegistry.register('credit', {
  id: 'credit',
  label: 'Credit',
  icon: '📋',
  requiresAmount: false,
  
  onSelect() {
    const cashSection = document.getElementById("cash-input-section");
    const creditSection = document.getElementById("credit-section");
    const splitSection = document.getElementById("split-section");
    const amountInput = document.getElementById("payment-amount");
    const total = CartState.summary.total;
    
    if (cashSection) cashSection.style.display = "none";
    if (creditSection) creditSection.style.display = "block";
    if (splitSection) splitSection.style.display = "none";
    
    // Auto-set amount to total
    CartState.payment.amountPaid = total;
    if (amountInput) {
      amountInput.value = total.toFixed(2);
      amountInput.disabled = true;
    }
    
    this._loadCustomers();
  },
  
  async _loadCustomers() {
    const select = document.getElementById("credit-customer-select");
    if (!select) return;
    
    select.innerHTML = '<option value="">Loading customers...</option>';
    
    try {
      const raw = await api("GET_CUSTOMERS");
      const response = typeof raw === "string" ? JSON.parse(raw) : raw;
      
      if (response.success && Array.isArray(response.data)) {
        select.innerHTML = '<option value="">Select customer</option>' +
          response.data.map(c => `
            <option value="${c.id}" data-balance="${c.balance || 0}">
              ${c.name} ${c.phone ? '- ' + c.phone : ''} ${Number(c.balance) > 0 ? '(Balance: KES ' + Number(c.balance).toFixed(2) + ')' : ''}
            </option>
          `).join("");
      } else {
        select.innerHTML = '<option value="">No customers available</option>';
      }
    } catch (error) {
      console.error("Failed to load customers:", error);
      select.innerHTML = '<option value="">Error loading customers</option>';
    }
  },
  
  validate() {
    const customerSelect = document.getElementById("credit-customer-select");
    if (!customerSelect || !customerSelect.value) {
      throw new Error("Please select a customer for credit payment");
    }
  },
  
  getPaymentData() {
    const customerSelect = document.getElementById("credit-customer-select");
    const notesInput = document.getElementById("credit-notes");
    
    return {
      method: 'credit',
      amountPaid: CartState.summary.total,
      customerId: customerSelect ? customerSelect.value : null,
      notes: notesInput ? notesInput.value : ''
    };
  }
});

/**
 * Split Payment Handler
 */
PaymentMethodRegistry.register('split', {
  id: 'split',
  label: 'Split',
  icon: '🔀',
  requiresAmount: false,
  
  onSelect() {
    const cashSection = document.getElementById("cash-input-section");
    const creditSection = document.getElementById("credit-section");
    const splitSection = document.getElementById("split-section");
    const amountInput = document.getElementById("payment-amount");
    
    if (cashSection) cashSection.style.display = "none";
    if (creditSection) creditSection.style.display = "none";
    if (splitSection) splitSection.style.display = "block";
    
    // Disable the single amount input
    if (amountInput) {
      amountInput.value = "0.00";
      amountInput.disabled = true;
    }
    
    // Initialize split ledger
    SplitLedger.init();
  },
  
  validate() {
    const remaining = CartState.getRemaining();
    if (remaining > 0) {
      throw new Error(`Remaining amount: ${PricingService.formatCurrency(remaining)}. Add more splits.`);
    }
  },
  
  getPaymentData() {
    return {
      method: 'split',
      amountPaid: CartState.payment.ledger,
      splits: CartState.payment.splits,
      customerId: null
    };
  }
});

/**
 * SplitLedger — Manages split payment entries
 */
const SplitLedger = {
  
  /**
   * Initialize split ledger UI
   */
  init() {
    this._renderSplits();
    this._updateRemaining();
    
    const addBtn = document.getElementById("split-add-btn");
    if (addBtn) {
      addBtn.onclick = () => this._addSplit();
    }
  },
  
  /**
   * Render current splits list
   */
  _renderSplits() {
    const list = document.getElementById("split-list");
    if (!list) return;
    
    const splits = CartState.payment.splits;
    
    if (splits.length === 0) {
      list.innerHTML = '<div class="split-empty">No splits added yet</div>';
      return;
    }
    
    list.innerHTML = splits.map((split, index) => `
      <div class="split-item" data-index="${index}">
        <span class="split-method">${split.method}</span>
        <span class="split-amount">${PricingService.formatCurrency(split.amount)}</span>
        <button class="split-remove-btn" onclick="SplitLedger._removeSplit(${index})">&times;</button>
      </div>
    `).join("");
  },
  
  /**
   * Update remaining amount display
   */
  _updateRemaining() {
    const remaining = CartState.getRemaining();
    const remainingEl = document.getElementById("split-remaining");
    if (remainingEl) {
      remainingEl.textContent = PricingService.formatCurrency(remaining);
      remainingEl.style.color = remaining > 0 ? 'var(--color-danger)' : 'var(--color-success)';
    }
    
    // Enable/disable confirm button
    const confirmBtn = document.getElementById("confirm-payment-btn");
    if (confirmBtn) {
      confirmBtn.disabled = remaining > 0;
    }
  },
  
  /**
   * Add a new split payment
   */
  _addSplit() {
    const methodSelect = document.getElementById("split-method-select");
    const amountInput = document.getElementById("split-amount-input");
    
    if (!methodSelect || !amountInput) return;
    
    const method = methodSelect.value;
    const amount = Number(amountInput.value) || 0;
    
    if (amount <= 0) {
      Toast.warning("Please enter a valid amount");
      return;
    }
    
    const remaining = CartState.getRemaining();
    if (amount > remaining) {
      Toast.warning(`Amount exceeds remaining balance of ${PricingService.formatCurrency(remaining)}`);
      return;
    }
    
    CartState.addSplit(method, amount);
    
    // Clear input
    amountInput.value = "";
    
    // Re-render
    this._renderSplits();
    this._updateRemaining();
  },
  
  /**
   * Remove a split payment
   */
  _removeSplit(index) {
    const splits = CartState.payment.splits;
    if (index < 0 || index >= splits.length) return;
    
    const removed = splits.splice(index, 1)[0];
    CartState.payment.ledger -= removed.amount;
    
    this._renderSplits();
    this._updateRemaining();
  }
};

/**
 * MpesaHandler — Handles M-Pesa STK push flow
 */
const MpesaHandler = {
  
  /**
   * Initiate STK push
   */
  async initiatePayment(phone, amount) {
    try {
      const result = await MpesaService.initiateSTK(phone, amount);
      
      if (result && result.checkoutRequestId) {
        // Start polling
        return await this._pollStatus(result.checkoutRequestId);
      }
      
      return result;
    } catch (error) {
      console.error("M-Pesa payment initiation failed:", error);
      throw error;
    }
  },
  
  /**
   * Poll transaction status
   */
  async _pollStatus(checkoutRequestId) {
    const maxAttempts = 30; // 30 seconds
    const interval = 1000; // 1 second
    
    for (let i = 0; i < maxAttempts; i++) {
      try {
        const status = await MpesaService.pollStatus(checkoutRequestId);
        
        if (status && status.status === "completed") {
          return status;
        }
        
        if (status && status.status === "failed") {
          throw new Error(status.message || "M-Pesa transaction failed");
        }
        
        // Still pending, wait
        await new Promise(resolve => setTimeout(resolve, interval));
      } catch (error) {
        throw error;
      }
    }
    
    throw new Error("M-Pesa transaction timed out");
  }
};
</script>
