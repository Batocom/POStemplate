<script>
/**
 * PaymentModal — Handles payment UI using method registry pattern
 * 
 * Supports multiple payment methods registered via PaymentMethodRegistry.
 * Each method handler implements:
 * - id: string
 * - label: string
 * - icon: string (emoji)
 * - renderSection(): returns HTML string for the method-specific section
 * - onSelect(): called when method is selected
 * - validate(): throws error if invalid
 * - getPaymentData(): returns { method, amountPaid, customerId, notes }
 * 
 * Built-in handlers: cash, mpesa, credit, split
 * Extend by registering new handlers in PaymentMethodRegistry
 */
const PaymentModal = {
  
  /**
   * Initialize modal when shown
   */
  init() {
    console.log('PaymentModal.init() called');
    
    const total = CartState.summary.total;
    console.log('Total:', total);
    
    // Check if DOM elements exist
    console.log('payment-total:', document.getElementById("payment-total"));
    console.log('payment-method-options:', document.getElementById("payment-method-options"));
    console.log('cash-section:', document.getElementById("cash-section"));
    console.log('mpesa-section:', document.getElementById("mpesa-section"));
    console.log('credit-section:', document.getElementById("credit-section"));
    console.log('split-section:', document.getElementById("split-section"));
    
    // Update total display
    const totalEl = document.getElementById("payment-total");
    const itemCountEl = document.getElementById("payment-item-count");
    const summaryTotalEl = document.getElementById("payment-summary-total");
    
    if (totalEl) totalEl.textContent = PricingService.formatCurrency(total);
    if (itemCountEl) itemCountEl.textContent = CartState.getTotalQuantity();
    if (summaryTotalEl) summaryTotalEl.textContent = PricingService.formatCurrency(total);
    
    // Reset loading state on button
    this._setLoading(false);
    
    // Render payment methods dynamically
    this._renderPaymentMethods();
    
    // Reset all sections to hidden — scope to payment container only
    // so the hidden home wrapper's copy is never accidentally targeted
    const paymentRoot = document.getElementById('paymentModalContent') || document;
    paymentRoot.querySelectorAll('.payment-section').forEach(s => {
      s.style.display = 'none';
      s.style.opacity = '0';
      s.style.transform = 'translateY(10px)';
    });
    
    // Reset change display
    const changeDisplay = document.getElementById("change-display");
    if (changeDisplay) changeDisplay.style.display = "none";
    
    // Reset credit error
    const creditError = document.getElementById("credit-load-error");
    if (creditError) creditError.style.display = "none";
    
    // Reset M-Pesa status
    const mpesaStatus = document.getElementById("mpesa-status-area");
    if (mpesaStatus) mpesaStatus.style.display = "none";
    
    // Clear any existing splits
    CartState.clearSplits();
    
    // Set default method
    this.setMethod("cash");
    
    // Trigger amount change to update UI
    this.onAmountChange();
    
    console.log('PaymentModal.init() complete');
  },
  
  /**
   * Render payment method buttons dynamically
   */
  _renderPaymentMethods() {
    const container = document.getElementById("payment-method-options");
    if (!container) {
      console.error('Payment method options container not found');
      return;
    }
    
    const methods = PaymentMethodRegistry.getAll();
    
    if (methods.length === 0) {
      console.error('No payment methods registered');
      return;
    }
    
    container.innerHTML = methods.map(method => `
      <button class="payment-method-btn" data-method="${method.id}" onclick="PaymentModal.setMethod('${method.id}')">
        <span class="payment-method-icon">${method.icon}</span>
        <span class="payment-method-label">${method.label}</span>
      </button>
    `).join("");
    
    console.log('Rendered payment methods:', methods.length);
  },
  
  /**
   * Set payment method with visual feedback - TAB BEHAVIOR
   */
  setMethod(methodId) {
    CartState.payment.method = methodId;
    
    // Update button states with animation
    document.querySelectorAll(".payment-method-btn").forEach(btn => {
      const isActive = btn.dataset.method === methodId;
      btn.classList.toggle("active", isActive);
      if (isActive) {
        // Add a brief pulse animation
        btn.style.animation = 'none';
        btn.offsetHeight; // trigger reflow
        btn.style.animation = 'methodPulse 0.3s ease';
      }
    });
    
    // Hide all sections first — scope to payment container only
    const paymentRoot = document.getElementById('paymentModalContent') || document;
    paymentRoot.querySelectorAll('.payment-section').forEach(s => {
      s.style.display = 'none';
      s.style.opacity = '0';
      s.style.transform = 'translateY(10px)';
    });
    
    // Show the selected section with animation
    const sectionId = methodId + '-section';
    const section = document.getElementById(sectionId);
    if (section) {
      section.style.display = 'block';
      // Force reflow before adding transition
      void section.offsetHeight;
      section.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      section.style.opacity = '1';
      section.style.transform = 'translateY(0)';
    } else {
      console.error('Section not found:', sectionId);
    }
    
    // AUTO-POPULATE AMOUNT for all methods
    const total = CartState.summary.total;
    CartState.payment.amountPaid = total;
    
    // Call handler's onSelect
    const handler = PaymentMethodRegistry.get(methodId);
    if (handler && handler.onSelect) {
      handler.onSelect();
    }
    
    // Update change and button state
    this.onAmountChange();
    
    // Update helper text
    this._updateHelperText(methodId);
  },
  
  /**
   * Update helper text based on selected method
   */
  _updateHelperText(methodId) {
    const hints = {
      cash: 'Enter the amount received from customer',
      mpesa: 'Enter customer phone number to send payment request',
      credit: 'Select a customer to record this as a credit sale',
      split: 'Add multiple payment methods to cover the total'
    };
    
    // Helper text is now in each section header, no need for separate element
  },
  
  /**
   * Calculate change on input (only for cash method)
   * Other methods auto-populate with total
   */
  onAmountChange() {
    const method = CartState.payment.method;
    
    // Only calculate change for cash method
    if (method !== 'cash') {
      const changeDisplay = document.getElementById("change-display");
      if (changeDisplay) changeDisplay.style.display = "none";
      return;
    }
    
    const amountInput = document.getElementById("payment-amount");
    const amount = Number(amountInput ? amountInput.value : 0) || 0;
    
    CartState.payment.amountPaid = amount;
    
    const total = CartState.summary.total;
    const change = CheckoutService.calculateChange(amount);
    const changeDisplay = document.getElementById("change-display");
    const changeAmount = document.getElementById("change-amount");
    
    if (change > 0) {
      if (changeDisplay) {
        changeDisplay.style.display = "flex";
        // Animate in
        changeDisplay.style.opacity = '0';
        changeDisplay.style.transform = 'translateY(-10px)';
        requestAnimationFrame(() => {
          changeDisplay.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
          changeDisplay.style.opacity = '1';
          changeDisplay.style.transform = 'translateY(0)';
        });
      }
      if (changeAmount) changeAmount.textContent = PricingService.formatCurrency(change);
    } else {
      if (changeDisplay) {
        changeDisplay.style.opacity = '0';
        changeDisplay.style.transform = 'translateY(-10px)';
        setTimeout(() => {
          changeDisplay.style.display = "none";
        }, 300);
      }
    }
    
    // Enable/disable confirm button
    this._updateConfirmButton();
  },
  
  /**
   * Update confirm button state based on current method validation
   */
  _updateConfirmButton() {
    const confirmBtn = document.getElementById("confirm-payment-btn");
    if (!confirmBtn) return;
    
    const method = CartState.payment.method;
    const handler = PaymentMethodRegistry.get(method);
    
    if (handler && handler.validate) {
      try {
        handler.validate();
        confirmBtn.disabled = false;
        confirmBtn.classList.remove('btn--disabled');
      } catch (e) {
        confirmBtn.disabled = true;
        confirmBtn.classList.add('btn--disabled');
      }
    } else {
      // Fallback for methods without handler
      confirmBtn.disabled = false;
      confirmBtn.classList.remove('btn--disabled');
    }
  },
  
  /**
   * Set loading state on confirm button
   */
  _setLoading(isLoading) {
    const confirmBtn = document.getElementById("confirm-payment-btn");
    const btnText = confirmBtn?.querySelector('.btn-text');
    const btnSpinner = confirmBtn?.querySelector('.btn-spinner');
    
    if (confirmBtn) {
      confirmBtn.disabled = isLoading;
      if (isLoading) {
        confirmBtn.classList.add('btn--loading');
        if (btnText) btnText.textContent = "Processing...";
        if (btnSpinner) btnSpinner.style.display = "inline-block";
      } else {
        confirmBtn.classList.remove('btn--loading');
        if (btnText) btnText.textContent = "Complete Sale";
        if (btnSpinner) btnSpinner.style.display = "none";
      }
    }
  },
  
  /**
   * Show inline validation error on a field
   */
  _showFieldError(fieldId, message) {
    const field = document.getElementById(fieldId);
    if (!field) return;
    
    // Remove any existing error
    this._clearFieldError(fieldId);
    
    // Add error class
    field.classList.add('field-error');
    
    // Create error message element
    const errorEl = document.createElement('div');
    errorEl.className = 'field-error-message';
    errorEl.id = fieldId + '-error';
    errorEl.textContent = message;
    
    // Insert after the field wrapper
    const wrapper = field.closest('.payment-amount-input-wrapper') || field.parentElement;
    wrapper.parentElement.insertBefore(errorEl, wrapper.nextSibling);
    
    // Shake animation
    field.style.animation = 'shake 0.4s ease';
    setTimeout(() => {
      field.style.animation = '';
    }, 400);
  },
  
  /**
   * Clear field error
   */
  _clearFieldError(fieldId) {
    const field = document.getElementById(fieldId);
    if (field) {
      field.classList.remove('field-error');
    }
    const errorEl = document.getElementById(fieldId + '-error');
    if (errorEl) {
      errorEl.remove();
    }
  },
  
  /**
   * Clear all field errors
   */
  _clearAllErrors() {
    document.querySelectorAll('.field-error').forEach(el => el.classList.remove('field-error'));
    document.querySelectorAll('.field-error-message').forEach(el => el.remove());
  },
  
  /**
   * Confirm payment and process checkout
   */
  async confirm() {
    try {
      // Clear previous errors
      this._clearAllErrors();
      
      // Validate payment
      const method = CartState.payment.method;
      const handler = PaymentMethodRegistry.get(method);
      
      if (handler && handler.validate) {
        handler.validate();
      }
      
      // Show loading state on button
      this._setLoading(true);
      
      // Get payment data
      let paymentData;
      if (handler && handler.getPaymentData) {
        paymentData = handler.getPaymentData();
      } else {
        paymentData = {
          method: method,
          amountPaid: Number(document.getElementById("payment-amount")?.value) || 0,
          customerId: null
        };
      }
      
      // Close payment modal FIRST (before processing)
      // This ensures no overlay conflicts
      Modal.close();
      
      // Small delay to ensure modal is fully closed
      await new Promise(resolve => setTimeout(resolve, 100));
      
      // Process checkout
      const saleResult = await CheckoutService.process(paymentData);
      
      // Show success toast
      Toast.success("Sale completed successfully!");
      
    } catch (error) {
      this._setLoading(false);
      
      // Show inline error if validation error
      if (error.message.includes('phone') || error.message.includes('Phone')) {
        this._showFieldError('mpesa-phone', error.message);
      } else if (error.message.includes('customer') || error.message.includes('Customer')) {
        this._showFieldError('credit-customer-select', error.message);
      } else if (error.message.includes('amount') || error.message.includes('Amount') || error.message.includes('payment')) {
        this._showFieldError('payment-amount', error.message);
      } else {
        Toast.error(error.message || "Payment failed");
      }
    }
  }
};

/**
 * Cash Payment Handler - AUTO POPULATES AMOUNT
 */
PaymentMethodRegistry.register('cash', {
  id: 'cash',
  label: 'Cash',
  icon: '💰',
  requiresAmount: true,
  
  onSelect() {
    const amountInput = document.getElementById("payment-amount");
    const total = CartState.summary.total;
    
    if (amountInput) {
      // AUTO-POPULATE with total amount
      amountInput.value = total.toFixed(2);
      amountInput.disabled = false;
      amountInput.style.display = 'block';
      amountInput.focus();
      // Select all text for easy override
      amountInput.select();
    }
    
    // Make sure the amount input wrapper is visible
    const amountWrapper = document.querySelector('.payment-amount');
    if (amountWrapper) {
      amountWrapper.style.display = 'block';
    }
    
    // Show change display
    const changeDisplay = document.getElementById("change-display");
    if (changeDisplay) {
      changeDisplay.style.display = "flex";
      changeDisplay.style.opacity = '0';
      changeDisplay.style.transform = 'translateY(-10px)';
      requestAnimationFrame(() => {
        changeDisplay.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        changeDisplay.style.opacity = '1';
        changeDisplay.style.transform = 'translateY(0)';
      });
    }
  },
  
  validate() {
    const amount = Number(document.getElementById("payment-amount")?.value) || 0;
    const total = CartState.summary.total;
    
    if (amount < total) {
      throw new Error(`Insufficient payment. Total is ${PricingService.formatCurrency(total)}, but received ${PricingService.formatCurrency(amount)}`);
    }
  },
  
  getPaymentData() {
    return {
      method: 'cash',
      amountPaid: Number(document.getElementById("payment-amount")?.value) || 0,
      customerId: null
    };
  }
});

/**
 * M-Pesa Payment Handler - AUTO POPULATES AMOUNT
 */
PaymentMethodRegistry.register('mpesa', {
  id: 'mpesa',
  label: 'M-Pesa',
  icon: '📱',
  requiresAmount: false,
  
  onSelect() {
    const total = CartState.summary.total;
    
    // AUTO-POPULATE amount
    CartState.payment.amountPaid = total;
    
    // Update amount display
    const amountDisplay = document.getElementById("mpesa-amount-display");
    if (amountDisplay) amountDisplay.textContent = PricingService.formatCurrency(total);
    
    // Make sure the M-Pesa input section is visible
    const mpesaInputSection = document.getElementById("mpesa-input-section");
    if (mpesaInputSection) {
      mpesaInputSection.style.display = 'block';
    }
    
    // Focus phone input
    const phoneInput = document.getElementById("mpesa-phone");
    if (phoneInput) {
      phoneInput.value = '';
      phoneInput.style.display = 'block';
      setTimeout(() => phoneInput.focus(), 400);
    }
    
    // Hide any previous status
    const statusArea = document.getElementById("mpesa-status-area");
    if (statusArea) statusArea.style.display = "none";
  },
  
  validate() {
    const phoneInput = document.getElementById("mpesa-phone");
    if (!phoneInput || !phoneInput.value.trim()) {
      throw new Error("Please enter M-Pesa phone number");
    }
    const phone = phoneInput.value.replace(/\s/g, '');
    if (!/^(254|0)[17]\d{8}$/.test(phone)) {
      throw new Error("Invalid phone number format. Use 254XXXXXXXXX or 07XXXXXXXX");
    }
  },
  
  getPaymentData() {
    const phoneInput = document.getElementById("mpesa-phone");
    return {
      method: 'mpesa',
      amountPaid: CartState.summary.total,  // Always use total
      customerId: null,
      phone: phoneInput ? phoneInput.value.trim() : ''
    };
  }
});

/**
 * Credit Payment Handler - AUTO POPULATES AMOUNT
 */
const creditHandler = {
  id: 'credit',
  label: 'Credit',
  icon: '📋',
  requiresAmount: false,
  
  onSelect() {
    const total = CartState.summary.total;
    
    // AUTO-POPULATE amount
    CartState.payment.amountPaid = total;
    
    // Update amount display
    const amountDisplay = document.getElementById("credit-amount-display");
    if (amountDisplay) amountDisplay.textContent = PricingService.formatCurrency(total);
    
    // Make sure the customer select is visible
    const customerWrapper = document.querySelector('.credit-customer');
    if (customerWrapper) {
      customerWrapper.style.display = 'block';
    }
    
    // Load customers
    this._loadCustomers();
  },
  
  async _loadCustomers() {
    const select = document.getElementById("credit-customer-select");
    const spinner = document.getElementById("credit-loading-spinner");
    const errorEl = document.getElementById("credit-load-error");
    const balanceEl = document.getElementById("credit-balance");
    
    if (!select) return;
    
    // Show loading state
    select.innerHTML = '<option value="">Loading customers...</option>';
    if (spinner) spinner.style.display = "inline-block";
    if (errorEl) errorEl.style.display = "none";
    if (balanceEl) balanceEl.style.display = "none";
    
    try {
      const raw = await api("GET_CUSTOMERS");
      const response = typeof raw === "string" ? JSON.parse(raw) : raw;
      
      if (spinner) spinner.style.display = "none";
      
      if (response.success && Array.isArray(response.data) && response.data.length > 0) {
        select.innerHTML = '<option value="">-- Select a customer --</option>' +
          response.data.map(c => `
            <option value="${c.id}" data-balance="${c.balance || 0}">
              ${c.name}${c.phone ? ' (' + c.phone + ')' : ''}${Number(c.balance) > 0 ? ' - Balance: KES ' + Number(c.balance).toFixed(2) : ''}
            </option>
          `).join("");
      } else if (response.success && Array.isArray(response.data) && response.data.length === 0) {
        select.innerHTML = '<option value="">No customers found</option>';
      } else {
        throw new Error(response.error || "Failed to load customers");
      }
    } catch (error) {
      console.error("Failed to load customers:", error);
      if (spinner) spinner.style.display = "none";
      if (errorEl) errorEl.style.display = "flex";
      select.innerHTML = '<option value="">Error loading customers</option>';
    }
  },
  
  validate() {
    const customerSelect = document.getElementById("credit-customer-select");
    if (!customerSelect || !customerSelect.value) {
      throw new Error("Please select a customer for credit payment");
    }
  },
  
  getPaymentData() {
    const customerSelect = document.getElementById("credit-customer-select");
    const notesInput = document.getElementById("credit-notes");
    
    return {
      method: 'credit',
      amountPaid: CartState.summary.total,  // Always use total
      customerId: customerSelect ? customerSelect.value : null,
      notes: notesInput ? notesInput.value : ''
    };
  }
};

PaymentMethodRegistry.register('credit', creditHandler);

/**
 * Split Payment Handler - AUTO POPULATES AMOUNT
 */
PaymentMethodRegistry.register('split', {
  id: 'split',
  label: 'Split',
  icon: '🔀',
  requiresAmount: false,
  
  onSelect() {
    // AUTO-POPULATE ledger with total
    CartState.payment.amountPaid = CartState.summary.total;
    
    // Make sure the split add row is visible
    const splitAddRow = document.querySelector('.split-add-row');
    if (splitAddRow) {
      splitAddRow.style.display = 'flex';
    }
    
    // Initialize split ledger
    SplitLedger.init();
  },
  
  validate() {
    const remaining = CartState.getRemaining();
    if (remaining > 0.01) { // Allow tiny rounding errors
      throw new Error(`Remaining amount: ${PricingService.formatCurrency(remaining)}. Add more splits to cover the total.`);
    }
  },
  
  getPaymentData() {
    return {
      method: 'split',
      amountPaid: CartState.payment.ledger,
      splits: CartState.payment.splits,
      customerId: null
    };
  }
});

/**
 * SplitLedger — Manages split payment entries with visual feedback
 */
const SplitLedger = {
  
  /**
   * Initialize split ledger UI
   */
  init() {
    this._renderSplits();
    this._updateProgress();
    
    const addBtn = document.getElementById("split-add-btn");
    if (addBtn) {
      addBtn.onclick = () => this._addSplit();
    }
    
    // Enter key on amount input
    const amountInput = document.getElementById("split-amount-input");
    if (amountInput) {
      amountInput.onkeydown = (e) => {
        if (e.key === "Enter") {
          this._addSplit();
        }
      };
    }
  },
  
  /**
   * Render current splits list with animation
   */
  _renderSplits() {
    const list = document.getElementById("split-list");
    if (!list) return;
    
    const splits = CartState.payment.splits;
    
    if (splits.length === 0) {
      list.innerHTML = '<div class="split-empty">No splits added yet</div>';
      return;
    }
    
    list.innerHTML = splits.map((split, index) => `
      <div class="split-item" data-index="${index}" style="animation: slideIn 0.3s ease ${index * 0.05}s both;">
        <div class="split-item-info">
          <span class="split-item-icon">${this._getMethodIcon(split.method)}</span>
          <span class="split-item-method">${split.method.charAt(0).toUpperCase() + split.method.slice(1)}</span>
        </div>
        <span class="split-item-amount">${PricingService.formatCurrency(split.amount)}</span>
        <button class="split-remove-btn" onclick="SplitLedger._removeSplit(${index})" title="Remove split">
          <span class="split-remove-icon">&times;</span>
        </button>
      </div>
    `).join("");
  },
  
  /**
   * Get icon for payment method
   */
  _getMethodIcon(method) {
    const icons = {
      cash: '💰',
      mpesa: '📱',
      credit: '📋'
    };
    return icons[method] || '💳';
  },
  
  /**
   * Update progress bar and remaining amount
   */
  _updateProgress() {
    const total = CartState.summary.total;
    const paid = CartState.payment.ledger;
    const remaining = Math.max(0, total - paid);
    const percentage = total > 0 ? Math.min(100, (paid / total) * 100) : 0;
    
    // Update progress bar
    const fill = document.getElementById("split-progress-fill");
    if (fill) {
      fill.style.width = percentage + '%';
      fill.style.transition = 'width 0.5s ease';
      
      // Change color based on progress
      if (percentage >= 100) {
        fill.style.background = 'var(--color-success)';
      } else if (percentage >= 50) {
        fill.style.background = 'var(--color-warning)';
      } else {
        fill.style.background = 'var(--color-primary)';
      }
    }
    
    // Update amounts
    const paidEl = document.getElementById("split-paid-amount");
    const remainingEl = document.getElementById("split-remaining-amount");
    
    if (paidEl) paidEl.textContent = PricingService.formatCurrency(paid);
    if (remainingEl) {
      remainingEl.textContent = PricingService.formatCurrency(remaining);
      remainingEl.className = remaining > 0 ? 'split-remaining-danger' : 'split-remaining-success';
    }
    
    // Update confirm button
    PaymentModal._updateConfirmButton();
  },
  
  /**
   * Add a new split payment with validation
   */
  _addSplit() {
    const methodSelect = document.getElementById("split-method-select");
    const amountInput = document.getElementById("split-amount-input");
    
    if (!methodSelect || !amountInput) return;
    
    const method = methodSelect.value;
    const amount = Number(amountInput.value) || 0;
    
    if (amount <= 0) {
      Toast.warning("Please enter a valid amount greater than 0");
      amountInput.focus();
      return;
    }
    
    const remaining = CartState.getRemaining();
    if (amount > remaining + 0.01) { // Allow tiny rounding
      Toast.warning(`Amount exceeds remaining balance of ${PricingService.formatCurrency(remaining)}`);
      amountInput.focus();
      return;
    }
    
    CartState.addSplit(method, amount);
    
    // Clear input and focus
    amountInput.value = "";
    amountInput.focus();
    
    // Re-render with animation
    this._renderSplits();
    this._updateProgress();
    
    // Show brief success feedback
    Toast.success(`Added ${method} split of ${PricingService.formatCurrency(amount)}`);
  },
  
  /**
   * Remove a split payment with animation
   */
  _removeSplit(index) {
    const splits = CartState.payment.splits;
    if (index < 0 || index >= splits.length) return;
    
    const removed = splits.splice(index, 1)[0];
    CartState.payment.ledger -= removed.amount;
    
    // Animate removal
    const item = document.querySelector(`.split-item[data-index="${index}"]`);
    if (item) {
      item.style.animation = 'slideOut 0.3s ease forwards';
      setTimeout(() => {
        this._renderSplits();
        this._updateProgress();
      }, 300);
    } else {
      this._renderSplits();
      this._updateProgress();
    }
    
    Toast.info(`Removed ${removed.method} split of ${PricingService.formatCurrency(removed.amount)}`);
  }
};

/**
 * MpesaHandler — Handles M-Pesa STK push flow
 */
const MpesaHandler = {
  
  /**
   * Initiate STK push
   */
  async initiatePayment(phone, amount) {
    // Show status area
    const statusArea = document.getElementById("mpesa-status-area");
    const statusText = document.getElementById("mpesa-status-text");
    if (statusArea) statusArea.style.display = "flex";
    if (statusText) statusText.textContent = "Sending payment request to " + phone + "...";
    
    try {
      const result = await MpesaService.initiateSTK(phone, amount);
      
      if (result && result.checkoutRequestId) {
        if (statusText) statusText.textContent = "Waiting for customer to enter PIN on their phone...";
        // Start polling
        return await this._pollStatus(result.checkoutRequestId);
      }
      
      return result;
    } catch (error) {
      if (statusArea) statusArea.style.display = "none";
      console.error("M-Pesa payment initiation failed:", error);
      throw error;
    }
  },
  
  /**
   * Poll transaction status
   */
  async _pollStatus(checkoutRequestId) {
    const maxAttempts = 30;
    const interval = 1000;
    const statusText = document.getElementById("mpesa-status-text");
    
    for (let i = 0; i < maxAttempts; i++) {
      try {
        const status = await MpesaService.pollStatus(checkoutRequestId);
        
        if (status && status.status === "completed") {
          if (statusText) statusText.textContent = "✓ Payment received!";
          return status;
        }
        
        if (status && status.status === "failed") {
          if (statusText) statusText.textContent = "✗ Payment failed: " + (status.message || "Unknown error");
          throw new Error(status.message || "M-Pesa transaction failed");
        }
        
        // Update status with elapsed time
        if (statusText) {
          const elapsed = i + 1;
          statusText.textContent = `Waiting for customer to enter PIN... (${elapsed}s)`;
        }
        
        await new Promise(resolve => setTimeout(resolve, interval));
      } catch (error) {
        throw error;
      }
    }
    
    throw new Error("M-Pesa transaction timed out after 30 seconds");
  }
};
</script>
