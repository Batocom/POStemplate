<style>

:root {
  --primary-color: #2563eb;
  --sidebar-width: 280px;
}

* {
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  margin: 0;
  padding: 0;
  -webkit-text-size-adjust: 100%;
  -moz-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

/* ===== MOBILE SIDEBAR ===== */

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 40;
}

.sidebar-overlay.open {
  display: block;
}

.mobile-sidebar {
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  width: var(--sidebar-width);
  max-width: 85vw;
  background: #111827;
  color: white;
  z-index: 50;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.mobile-sidebar.open {
  transform: translateX(0);
}

.sidebar-close-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: none;
  color: #9ca3af;
  font-size: 1.5rem;
  cursor: pointer;
  padding: 8px 12px;
  line-height: 1;
  z-index: 1;
}

.sidebar-close-btn:hover {
  color: white;
}

/* Hide desktop sidebar on mobile */
@media (max-width: 767px) {
  .desktop-sidebar {
    display: none !important;
  }
}

/* Show mobile sidebar toggle */
@media (min-width: 768px) {
  .mobile-sidebar-toggle {
    display: none !important;
  }
  .sidebar-overlay {
    display: none !important;
  }
  .mobile-sidebar {
    display: none !important;
  }
}

/* ===== ANIMATIONS ===== */

@keyframes slideIn {
  from {
    transform: translateX(100%);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

@keyframes slideOut {
  from {
    transform: translateX(0);
    opacity: 1;
  }
  to {
    transform: translateX(100%);
    opacity: 0;
  }
}

/* ===== TOAST RESPONSIVE ===== */
.toast-container {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 90vw;
}

@media (max-width: 767px) {
  .toast-container {
    left: 16px;
    right: 16px;
    top: 8px;
  }
}

/* ===== MODAL RESPONSIVE ===== */
@media (max-width: 767px) {
  .modal-content {
    width: 95% !important;
    max-width: 95% !important;
    margin: 8px auto !important;
    max-height: 90vh !important;
  }
  
  .modal-sm {
    width: 95% !important;
  }
  
  .modal-md {
    width: 95% !important;
  }
  
  .modal-lg {
    width: 95% !important;
  }
}

/* ===== RESPONSIVE UTILITY CLASSES ===== */

@media (max-width: 767px) {
  .hide-mobile {
    display: none !important;
  }
  
  .show-mobile {
    display: block !important;
  }
  
  .text-sm-mobile {
    font-size: 0.875rem !important;
  }
}

@media (min-width: 768px) {
  .show-mobile {
    display: none !important;
  }
}

</style>
