<style>
/* ===== RESPONSIVE LAYOUT SYSTEM ===== */

/* ===== BREAKPOINTS ===== */
/* Mobile first */
/* 0-479px: small phone */
/* 480-767px: phone */
/* 768-1023px: tablet */
/* 1024-1279px: desktop */
/* 1280px+: wide */

/* ===== LAYOUT ===== */
.layout--desktop {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

.layout--mobile {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.layout__main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.layout__content {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

/* ===== RESPONSIVE UTILITY CLASSES ===== */

@media (max-width: 767px) {
  .hide-mobile {
    display: none !important;
  }
  .show-mobile {
    display: block !important;
  }
  .text-sm-mobile {
    font-size: 0.875rem !important;
  }
}

@media (min-width: 768px) {
  .show-mobile {
    display: none !important;
  }
}

/* ===== GRID SYSTEM ===== */
.grid-responsive {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

@media (min-width: 480px) {
  .grid-responsive {
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
}

@media (min-width: 768px) {
  .grid-responsive {
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
}

/* ===== ANIMATIONS ===== */
@keyframes slideIn {
  from {
    transform: translateX(100%);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

@keyframes slideOut {
  from {
    transform: translateX(0);
    opacity: 1;
  }
  to {
    transform: translateX(100%);
    opacity: 0;
  }
}
</style>
