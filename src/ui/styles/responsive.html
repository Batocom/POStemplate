<style>
/* ===== MOBILE-FIRST LAYOUT ENFORCEMENT ===== */

/* Force full-width on all screens below 768px */
@media (max-width: 767px) {
  /* Prevent horizontal scroll */
  html, body {
    overflow-x: hidden !important;
    width: 100% !important;
    max-width: 100vw !important;
  }

  /* Force app-shell to be full-width */
  .app-shell {
    width: 100% !important;
    max-width: 100vw !important;
    overflow-x: hidden !important;
  }

  /* Force app-content to be full-width */
  .app-content {
    width: 100% !important;
    max-width: 100vw !important;
    margin-left: 0 !important;
    padding-left: 0 !important;
    padding-right: 0 !important;
  }

  /* Force page-content to be full-width */
  .page-content {
    width: 100% !important;
    max-width: 100vw !important;
    padding-left: var(--space-3) !important;
    padding-right: var(--space-3) !important;
  }

  /* Force all cards to be full-width */
  .card {
    width: 100% !important;
    max-width: 100% !important;
    margin-left: 0 !important;
    margin-right: 0 !important;
  }

  /* Force all tables to be full-width */
  .table {
    width: 100% !important;
    max-width: 100% !important;
  }

  /* Force all modals to be full-screen */
  .modal-content {
    width: 100vw !important;
    max-width: 100vw !important;
    height: 100dvh !important;
    max-height: 100dvh !important;
    border-radius: 0 !important;
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
  }

  /* Force all buttons to have adequate tap targets */
  .btn {
    min-height: 44px !important;
  }

  /* Force all inputs to have adequate tap targets */
  .form-input {
    min-height: 44px !important;
  }

  /* Prevent any element from causing horizontal scroll */
  * {
    max-width: 100vw !important;
    box-sizing: border-box !important;
  }
}

/* ===== RESPONSIVE LAYOUT SYSTEM ===== */

/* ===== BREAKPOINTS ===== */
/* Mobile first */
/* 0-479px: small phone */
/* 480-767px: phone */
/* 768-1023px: tablet */
/* 1024-1279px: desktop */
/* 1280px+: wide */

/* ===== LAYOUT ===== */
.layout--desktop {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

.layout--mobile {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.layout__main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.layout__content {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

/* ===== RESPONSIVE UTILITY CLASSES ===== */

@media (max-width: 767px) {
  .hide-mobile {
    display: none !important;
  }
  .show-mobile {
    display: block !important;
  }
  .text-sm-mobile {
    font-size: 0.875rem !important;
  }
}

@media (min-width: 768px) {
  .show-mobile {
    display: none !important;
  }
}

/* ===== GRID SYSTEM ===== */
.grid-responsive {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

@media (min-width: 480px) {
  .grid-responsive {
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
}

@media (min-width: 768px) {
  .grid-responsive {
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
}

/* ===== ANIMATIONS ===== */
@keyframes slideIn {
  from {
    transform: translateX(100%);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

@keyframes slideOut {
  from {
    transform: translateX(0);
    opacity: 1;
  }
  to {
    transform: translateX(100%);
    opacity: 0;
  }
}
</style>
