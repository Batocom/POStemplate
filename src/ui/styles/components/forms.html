<style>

/* Patterns: F-01, F-02 — Standard CRUD Form, Modal Form */
/* UI_PATTERN_REGISTRY.md — Form Patterns */

.form-group {

  margin-bottom: var(--space-4);
}

.form-label {

}

.form-input {

  min-height: 44px;
  padding: var(--space-3);

  border: 1px solid var(--color-border-default);

}

.form-input:focus {

  box-shadow: 0 0 0 2px var(--color-primary-subtle);
}

.form-input:disabled,

  background: var(--color-bg-subtle);
}

.form-input::placeholder {

}
