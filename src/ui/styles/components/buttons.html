<style>
/* ===== BUTTON COMPONENT ===== */
/* Patterns: B-01 through B-05 */
/* UI_PATTERN_REGISTRY.md — Button Patterns */
/* RESPONSIVE_PATTERNS.md Section 12.1 — Tap Target Rules */

/* ===== BASE BUTTON ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm);
  font-weight: var(--font-weight-medium);
  border-radius: var(--radius-md);
  border: none;
  cursor: pointer;
  transition: background-color var(--transition-fast) var(--easing-default), opacity var(--transition-fast);
  min-height: 36px;
  text-decoration: none;
  line-height: var(--leading-tight);
  white-space: nowrap;
  user-select: none;
  -webkit-user-select: none;
}

/* ===== FOCUS RING ===== */
.btn:focus-visible {
  outline: 2px solid var(--color-primary);
  outline-offset: 2px;
}

/* ===== DISABLED STATE ===== */
.btn:disabled,
.btn[disabled] {
  opacity: 0.5;
  cursor: not-allowed;
  pointer-events: none;
}

/* ===== B-01 — PRIMARY BUTTON ===== */
.btn--primary {
  background: var(--color-primary);
  color: var(--color-text-on-primary);
}

.btn--primary:hover {
  background: var(--color-primary-hover);
}

/* ===== B-02 — SECONDARY BUTTON ===== */
.btn--secondary {
  background: var(--color-bg-subtle);
  color: var(--color-text-primary);
  border: 1px solid var(--color-border-default);
}

.btn--secondary:hover {
  background: var(--color-border-subtle);
}

/* ===== B-03 — DANGER BUTTON ===== */
.btn--danger {
  background: var(--color-danger);
  color: var(--color-text-on-danger);
}

.btn--danger:hover {
  background: var(--color-danger-hover);
}

/* ===== B-04 — ICON BUTTON ===== */
.btn--icon {
  padding: var(--space-2);
  min-width: 44px;
  min-height: 44px;
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--color-text-secondary);
}

.btn--icon:hover {
  background: var(--color-bg-subtle);
  color: var(--color-text-primary);
}

/* ===== B-05 — FILTER / TAG BUTTON ===== */
.btn--filter {
  border-radius: var(--radius-full);
  border: 1px solid var(--color-border-default);
  background: var(--color-bg-subtle);
  color: var(--color-text-primary);
  padding: var(--space-1) var(--space-3);
  font-size: var(--text-xs);
}

.btn--filter:hover {
  background: var(--color-border-subtle);
}

.btn--filter--active {
  background: var(--color-primary);
  color: var(--color-text-on-primary);
  border-color: var(--color-primary);
}

.btn--filter--active:hover {
  background: var(--color-primary-hover);
}

/* ===== SIZE VARIANTS ===== */
.btn--full {
  width: 100%;
}

.btn--lg {
  padding: var(--space-3) var(--space-4);
  font-size: var(--text-md);
  min-height: 44px;
}

.btn--sm {
  padding: var(--space-1) var(--space-3);
  font-size: var(--text-xs);
  min-height: 32px;
}
