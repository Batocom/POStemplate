<style>
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9998;
  animation: modalFadeIn var(--transition-fast) ease-out;
  padding: var(--space-4);
}

.modal-overlay.closing {
  animation: modalFadeOut var(--transition-fast) ease-in;
}

.modal-content {
  background: white;
  border-radius: var(--radius-lg);
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  animation: modalSlideIn var(--transition-fast) ease-out;
  max-width: 560px;
}

.modal-content.closing {
  animation: modalSlideOut var(--transition-fast) ease-in;
}

.modal-content.sm { max-width: 400px; }
.modal-content.lg { max-width: 720px; }
.modal-content.xl { max-width: 960px; }
.modal-content.full { max-width: calc(100% - 32px); }

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-4) var(--space-6);
  border-bottom: 1px solid var(--color-border-subtle);
}

.modal-header h2 {
  font-size: var(--text-xl);
  font-weight: var(--font-weight-bold);
  margin: 0;
  color: var(--color-text-primary);
}

.modal-close-btn {
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: var(--color-text-secondary);
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  line-height: 1;
}

.modal-close-btn:hover {
  background: var(--color-bg-subtle);
  color: var(--color-text-primary);
}

.modal-body { padding: var(--space-6); }

.modal-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-8);
  gap: var(--space-4);
}

.modal-spinner {
  width: 40px;
  height: 40px;
  border: 4px solid var(--color-border-subtle);
  border-top-color: var(--color-primary);
  border-radius: 50%;
  animation: modalSpin 0.8s linear infinite;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: var(--space-2);
  padding: var(--space-4) var(--space-6);
  border-top: 1px solid var(--color-border-subtle);
  flex-wrap: wrap;
}

.modal-btn {
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-weight: var(--font-weight-medium);
  cursor: pointer;
  border: none;
  transition: background var(--transition-fast);
}

.modal-btn-primary { background: var(--color-primary); color: var(--color-text-on-primary); }
.modal-btn-primary:hover { background: var(--color-primary-hover); }

.modal-btn-secondary { background: var(--color-bg-subtle); color: var(--color-text-primary); }
.modal-btn-secondary:hover { background: var(--color-border-subtle); }

.modal-btn-danger { background: var(--color-danger); color: var(--color-text-on-danger); }
.modal-btn-danger:hover { background: var(--color-danger-hover); }

/* Confirm modal */
.modal-confirm-content {
  text-align: center;
  padding: var(--space-4) 0;
}

.modal-confirm-message {
  font-size: var(--text-lg);
  margin-bottom: var(--space-6);
}

.modal-actions--center {
  justify-content: center;
}

/* Alert modal */
.modal-alert-content {
  text-align: center;
  padding: var(--space-4) 0;
}

.modal-alert-message {
  font-size: var(--text-lg);
  margin-bottom: var(--space-6);
}

/* Loading text */
.modal-loading-text {
  color: var(--color-text-secondary);
}

@keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes modalFadeOut { from { opacity: 1; } to { opacity: 0; } }
@keyframes modalSlideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes modalSlideOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-20px); opacity: 0; } }
@keyframes modalSpin { to { transform: rotate(360deg); } }

@media (max-width: 768px) {
  .modal-overlay { padding: var(--space-3); }
  .modal-content { max-width: 100% !important; border-radius: var(--radius-md); }
  .modal-header { padding: var(--space-3) var(--space-4); }
  .modal-header h2 { font-size: var(--text-lg); }
  .modal-body { padding: var(--space-4); }
  .modal-actions { padding: var(--space-3) var(--space-4); }
  .modal-btn { padding: var(--space-2) var(--space-4); font-size: var(--text-sm); flex: 1; text-align: center; }
}

@media (max-width: 480px) {
  .modal-overlay { padding: var(--space-2); }
  .modal-header { padding: var(--space-2) var(--space-3); }
  .modal-body { padding: var(--space-3); }
  .modal-actions { padding: var(--space-2) var(--space-3); flex-direction: column; }
  .modal-btn { width: 100%; }
}
</style>
