<style>
/* ===== MODAL COMPONENT ===== */
/* Patterns: M-01 — Standard Modal, M-02 — Confirmation Modal */
/* RESPONSIVE_PATTERNS.md Section 10 — Modal Responsiveness */

/* ===== BODY SCROLL LOCK ===== */
body.modal-open {
  overflow: hidden;
}

/* ===== MODAL OVERLAY ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--color-overlay);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: var(--z-modal);
  animation: modalFadeIn var(--transition-fast) var(--easing-default);
  padding: 0;
}

.modal-overlay.closing {
  animation: modalFadeOut var(--transition-fast) var(--easing-default);
}

/* ===== MODAL CONTENT (Mobile Default) ===== */
.modal-content {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100vw;
  height: 100dvh;
  background: var(--color-bg-card);
  border-radius: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: translateY(100%);
  transition: transform var(--transition-normal) var(--easing-default);
  z-index: calc(var(--z-modal) + 1);
}

/* Open state: slide into view */
.modal-content.modal--open {
  transform: translateY(0);
}

/* ===== MODAL HEADER ===== */
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-4) var(--space-4);
  border-bottom: 1px solid var(--color-border-subtle);
  position: sticky;
  top: 0;
  background: var(--color-bg-card);
  z-index: 1;
}

.modal-header h2 {
  font-size: var(--text-lg);
  font-weight: var(--font-weight-bold);
  margin: 0;
  color: var(--color-text-primary);
}

.modal-close-btn {
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: var(--color-text-secondary);
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-sm);
  line-height: 1;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-close-btn:hover {
  background: var(--color-bg-subtle);
  color: var(--color-text-primary);
}

/* ===== MODAL BODY ===== */
.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-4);
  -webkit-overflow-scrolling: touch;
}

/* ===== MODAL LOADING STATE ===== */
.modal-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-8);
  gap: var(--space-4);
}

.modal-spinner {
  width: 40px;
  height: 40px;
  border: 4px solid var(--color-border-subtle);
  border-top-color: var(--color-primary);
  border-radius: 50%;
  animation: modalSpin 0.8s linear infinite;
}

.modal-loading-text {
  color: var(--color-text-secondary);
  font-size: var(--text-sm);
}

/* ===== MODAL ACTIONS / FOOTER ===== */
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: var(--space-2);
  padding: var(--space-4) var(--space-4);
  border-top: 1px solid var(--color-border-subtle);
  flex-wrap: wrap;
  position: sticky;
  bottom: 0;
  background: var(--color-bg-card);
  z-index: 1;
}

/* ===== MODAL BUTTONS ===== */
.modal-btn {
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-weight: var(--font-weight-medium);
  cursor: pointer;
  border: none;
  transition: background var(--transition-fast) var(--easing-default);
  min-height: 44px;
}

.modal-btn-primary {
  background: var(--color-primary);
  color: var(--color-text-on-primary);
}

.modal-btn-primary:hover {
  background: var(--color-primary-hover);
}

.modal-btn-secondary {
  background: var(--color-bg-subtle);
  color: var(--color-text-primary);
}

.modal-btn-secondary:hover {
  background: var(--color-border-subtle);
}

.modal-btn-danger {
  background: var(--color-danger);
  color: var(--color-text-on-danger);
}

.modal-btn-danger:hover {
  background: var(--color-danger-hover);
}

/* ===== CONFIRM MODAL ===== */
.modal-confirm-content {
  text-align: center;
  padding: var(--space-4) 0;
}

.modal-confirm-message {
  font-size: var(--text-lg);
  margin-bottom: var(--space-6);
  color: var(--color-text-primary);
}

.modal-actions--center {
  justify-content: center;
}

/* ===== ALERT MODAL ===== */
.modal-alert-content {
  text-align: center;
  padding: var(--space-4) 0;
}

.modal-alert-message {
  font-size: var(--text-lg);
  margin-bottom: var(--space-6);
  color: var(--color-text-primary);
}

/* ===== DESKTOP: CENTERED OVERLAY MODAL ===== */
@media (min-width: 768px) {
  .modal-overlay {
    padding: var(--space-4);
  }

  .modal-content {
    position: relative;
    bottom: auto;
    left: auto;
    right: auto;
    width: min(560px, 90vw);
    height: auto;
    max-height: 90dvh;
    background: var(--color-bg-card);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-xl);
    transform: scale(0.95);
    opacity: 0;
    transition: transform var(--transition-normal) var(--easing-default), opacity var(--transition-normal) var(--easing-default);
  }

  .modal-content.modal--open {
    transform: scale(1);
    opacity: 1;
  }

  .modal-header {
    padding: var(--space-4) var(--space-6);
  }

  .modal-header h2 {
    font-size: var(--text-xl);
  }

  .modal-body {
    padding: var(--space-6);
  }

  .modal-actions {
    padding: var(--space-4) var(--space-6);
  }

  .modal-btn {
    min-height: 36px;
  }

  /* Desktop width variants */
  .modal-content.modal--sm {
    width: min(400px, 90vw);
  }

  .modal-content.modal--lg {
    width: min(720px, 90vw);
  }

  .modal-content.modal--xl {
    width: min(960px, 90vw);
  }

  .modal-content.modal--full {
    width: calc(100% - var(--space-8));
    max-height: calc(100dvh - var(--space-8));
  }
}

/* ===== KEYFRAMES ===== */
@keyframes modalFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes modalFadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

@keyframes modalSpin {
  to { transform: rotate(360deg); }
}
</style>
