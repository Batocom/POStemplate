<style>

}

}

}

.modal-content.sm { max-width: 400px; }
.modal-content.lg { max-width: 720px; }
.modal-content.xl { max-width: 960px; }

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  border-bottom: 1px solid #e5e7eb;
}

  font-size: 1.25rem;

  margin: 0;
  color: #1f2937;
}

.modal-close-btn {

@media (max-width: 480px) {
