<style>
  /* ============================================================
     T-01 — Standard CRUD Table
     T-02 — Mobile Table / Card Transformation
     
     Architecture: RESPONSIVE_PATTERNS.md Section 8.1
     Pattern: UI_PATTERN_REGISTRY.md T-01, T-02
     
     Mobile-first: default styles are the mobile card layout.
     Desktop enhancement at --bp-tablet restores traditional table.
     ============================================================ */

  /* --- Table Wrapper (scroll fallback at intermediate sizes) --- */
  .table-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* --- Base Table (Mobile-first: Card Layout) --- */
  .table {
    width: 100%;
    border-collapse: collapse;
    font-size: var(--text-sm);
  }

  /* Hide thead visually but keep accessible (sr-only pattern) */
  .table thead {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
    padding: 0;
    margin: -1px;
  }

  /* Each row becomes a card */
  .table tr {
    display: block;
    margin-bottom: var(--space-3);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-lg);
    padding: var(--space-3);
    background: var(--color-bg-card);
  }

  /* Each cell becomes a flex row with label::before */
  .table td {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--color-border-subtle);
    padding: var(--space-2) 0;
    gap: var(--space-2);
  }

  /* Inject column label via data-label attribute */
  .table td::before {
    content: attr(data-label);
    font-weight: var(--font-weight-medium);
    color: var(--color-text-secondary);
    flex-shrink: 0;
  }

  /* Remove bottom border from last cell in card */
  .table td:last-child {
    border-bottom: none;
  }

  /* --- Desktop Enhancement (≥ --bp-tablet) --- */
  @media (min-width: 768px) {
    /* Restore thead visibility */
    .table thead {
      position: static;
      width: auto;
      height: auto;
      overflow: visible;
      clip: auto;
      white-space: normal;
      border: 0;
      padding: 0;
      margin: 0;
    }

    /* Restore table-row display */
    .table tr {
      display: table-row;
      margin-bottom: 0;
      border: none;
      border-radius: 0;
      padding: 0;
      background: transparent;
    }

    /* Restore table-cell display */
    .table td {
      display: table-cell;
      justify-content: unset;
      align-items: unset;
      border-bottom: 1px solid var(--color-border-subtle);
      padding: var(--space-2) var(--space-3);
      gap: unset;
    }

    /* Remove pseudo-element labels on desktop */
    .table td::before {
      content: none;
    }

    /* Table header styling */
    .table th {
      padding: var(--space-2) var(--space-3);
      background: var(--color-bg-subtle);
      font-weight: var(--font-weight-semibold);
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: left;
      border-bottom: 2px solid var(--color-border-default);
    }

    /* Cursor pointer for sortable headers */
    .table th[onclick] {
      cursor: pointer;
      user-select: none;
    }

    /* Remove last-child border override from mobile */
    .table td:last-child {
      border-bottom: 1px solid var(--color-border-subtle);
    }

    /* Desktop row hover effect */
    .table tbody tr:hover {
      background: var(--color-bg-subtle);
      transition: background var(--transition-fast) var(--easing-default);
    }
  }

  /* --- Wide Desktop Enhancement (optional) --- */
  @media (min-width: 1280px) {
    .table th,
    .table td {
      padding: var(--space-3) var(--space-4);
    }
  }
</style>
