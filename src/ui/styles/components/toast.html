<style>
/* ===== TOAST NOTIFICATION ===== */
/* Pattern: NT-01 — Toast Notification */
/* UI_PATTERN_REGISTRY.md — Notification Patterns */

/* ===== TOAST CONTAINER ===== */
.toast-container {
  position: fixed;
  top: var(--space-2);
  left: var(--space-4);
  right: var(--space-4);
  z-index: var(--z-toast);
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  pointer-events: none;
}

/* Desktop: right-aligned, constrained width */
@media (min-width: 768px) {
  .toast-container {
    left: auto;
    right: var(--space-4);
    max-width: 360px;
  }
}

/* ===== TOAST ITEM ===== */
.toast {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  color: var(--color-text-on-primary);
  font-size: var(--text-sm);
  font-weight: var(--font-weight-medium);
  pointer-events: auto;
  animation: toastSlideIn var(--transition-normal) var(--easing-default);
}

.toast--closing {
  animation: toastSlideOut var(--transition-normal) var(--easing-default);
}

/* ===== TOAST VARIANTS ===== */
.toast--success {
  background-color: var(--color-success);
}

.toast--error {
  background-color: var(--color-danger);
}

.toast--warning {
  background-color: var(--color-warning);
}

.toast--info {
  background-color: var(--color-info);
}

/* ===== TOAST ICON ===== */
.toast__icon {
  flex-shrink: 0;
  font-size: var(--text-md);
  line-height: 1;
}

/* ===== TOAST MESSAGE ===== */
.toast__message {
  flex: 1;
  line-height: var(--leading-normal);
}

/* ===== KEYFRAMES ===== */
@keyframes toastSlideIn {
  from {
    transform: translateX(100%);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

@keyframes toastSlideOut {
  from {
    transform: translateX(0);
    opacity: 1;
  }
  to {
    transform: translateX(100%);
    opacity: 0;
  }
}
</style>
