<style>
  /* =====================================================
     POS PAYMENT MODAL
     Scope: .payment-*, .credit-*, .change-*,
            .summary-*, .spinner, @keyframes spin
     ===================================================== */

  /* ── Modal inner wrapper ── */
  .payment-modal-inner {
    padding: 0;
  }

  /* ── Total display banner ── */
  .payment-total-display {
    text-align: center;
    padding: var(--space-5);
    background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-hover) 100%);
    border-radius: var(--radius-lg);
    color: var(--color-text-on-primary);
    margin-bottom: var(--space-5);
  }

  .payment-total-label {
    font-size: var(--text-md);
    opacity: 0.9;
    margin-bottom: var(--space-1);
  }

  .payment-total-amount {
    font-size: var(--text-3xl);
    font-weight: var(--font-weight-bold);
  }

  /* ── Method selector ── */
  .payment-methods {
    margin-bottom: var(--space-4);
  }

  .payment-method-label {
    display: block;
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
    margin-bottom: var(--space-2);
  }

  .payment-method-options {
    display: flex;
    gap: var(--space-2);
  }

  .payment-method-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-1);
    padding: var(--space-3) var(--space-2);
    border: 2px solid var(--color-border-subtle);
    border-radius: var(--radius-md);
    background: var(--color-bg-card);
    cursor: pointer;
    font-weight: var(--font-weight-medium);
    font-size: var(--text-sm);
    transition: all var(--transition-fast);
  }

  .payment-method-btn:hover {
    border-color: var(--color-text-disabled);
  }

  .payment-method-btn.active {
    border-color: var(--color-primary);
    background: var(--color-primary-subtle);
    color: var(--color-primary);
  }

  .payment-method-icon {
    font-size: var(--text-2xl);
  }

  /* ── Cash amount input ── */
  .payment-amount {
    margin-bottom: var(--space-4);
  }

  .payment-amount-label {
    display: block;
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
    margin-bottom: var(--space-2);
  }

  .payment-amount-input-wrapper {
    display: flex;
    align-items: center;
    border: 2px solid var(--color-border-subtle);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  .payment-amount-input-wrapper:focus-within {
    border-color: var(--color-primary);
  }

  .currency-symbol {
    padding: var(--space-3) var(--space-2) var(--space-3) var(--space-4);
    font-size: var(--text-xl);
    color: var(--color-text-disabled);
    font-weight: var(--font-weight-semibold);
  }

  .payment-amount-input {
    flex: 1;
    padding: 10px var(--space-3) 10px var(--space-1);
    border: none;
    outline: none;
    font-size: var(--text-md);
    font-weight: var(--font-weight-semibold);
  }

  /* ── Change display ── */
  .payment-change {
    text-align: center;
    padding: var(--space-3);
    background: var(--color-success-subtle);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-4);
  }

  .change-label {
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
  }

  .change-amount {
    font-size: var(--text-xl);
    font-weight: var(--font-weight-bold);
    color: var(--color-success);
  }

  /* ── Credit / debtor section ── */
  .payment-credit-section {
    margin-bottom: var(--space-4);
    padding: var(--space-3);
    background: var(--color-warning-subtle);
    border: 1px solid var(--color-warning);
    border-radius: var(--radius-md);
  }

  .credit-customer-select {
    width: 100%;
    padding: 10px var(--space-3);
    border: 2px solid var(--color-border-subtle);
    border-radius: var(--radius-md);
    font-size: var(--text-md);
    background: var(--color-bg-card);
    outline: none;
  }

  .credit-customer-select:focus {
    border-color: var(--color-primary);
  }

  .credit-balance {
    margin-top: var(--space-2);
    padding: var(--space-2) var(--space-3);
    background: var(--color-danger-subtle);
    border: 1px solid var(--color-danger);
    border-radius: var(--radius-sm);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .credit-balance-label {
    font-size: var(--text-sm);
    color: var(--color-danger);
  }

  .credit-balance-amount {
    font-size: var(--text-md);
    font-weight: var(--font-weight-bold);
    color: var(--color-danger-hover);
  }

  .credit-note {
    margin-top: var(--space-2);
  }

  .credit-notes-input {
    width: 100%;
    padding: var(--space-2) var(--space-3);
    border: 2px solid var(--color-border-subtle);
    border-radius: var(--radius-md);
    font-size: var(--text-sm);
    outline: none;
    resize: vertical;
    font-family: inherit;
  }

  .credit-notes-input:focus {
    border-color: var(--color-primary);
  }

  /* ── Payment summary row ── */
  .payment-summary {
    border-top: 1px solid var(--color-border-subtle);
    padding-top: var(--space-3);
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: var(--space-1) 0;
    font-size: var(--text-md);
    color: var(--color-text-secondary);
  }

  /* ── Loading overlay ── */
  .payment-loading-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--color-overlay-light);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    border-radius: var(--radius-lg);
  }

  .payment-loading-spinner {
    text-align: center;
  }

  .payment-loading-spinner p {
    margin-top: var(--space-3);
    color: var(--color-text-secondary);
    font-size: var(--text-md);
  }

  /* ── Spinner ── */
  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid var(--color-border-subtle);
    border-top: 4px solid var(--color-primary);
    border-radius: var(--radius-full);
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* ── 768px ── */
  @media (min-width: 768px) {
    .payment-total-amount { font-size: var(--text-3xl); }

    .payment-method-btn {
      padding: var(--space-3) var(--space-2);
      font-size: var(--text-sm);
    }

    .payment-method-icon { font-size: var(--text-2xl); }

    .payment-amount-input {
      font-size: var(--text-xl);
      padding: var(--space-3) var(--space-4) var(--space-3) var(--space-1);
    }

    .change-amount { font-size: var(--text-2xl); }
  }

  /* ── 1024px ── */
  @media (min-width: 1024px) {
    .payment-total-amount { font-size: var(--text-3xl); }

    .payment-method-btn {
      padding: var(--space-3) var(--space-2);
      font-size: var(--text-sm);
    }

    .payment-method-icon { font-size: var(--text-2xl); }

    .payment-amount-input {
      font-size: var(--text-xl);
      padding: var(--space-3) var(--space-4) var(--space-3) var(--space-1);
    }

    .change-amount { font-size: var(--text-2xl); }
  }
</style>
