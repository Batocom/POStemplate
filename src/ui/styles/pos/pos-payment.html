<style>
  /* =====================================================
     POS PAYMENT MODAL
     Scope: .payment-*, .credit-*, .change-*,
            .summary-*, .spinner, @keyframes spin
     ===================================================== */

  /* ── Modal inner wrapper ── */
  .payment-modal-inner {
    padding: 0;
    position: relative;
  }

  /* ── Total display banner ── */  
  .payment-total-display {
    text-align: center;
    padding: var(--space-5);
    background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-hover) 100%);
    border-radius: var(--radius-lg);
    color: var(--color-text-on-primary);
    margin-bottom: var(--space-5);
  }

  .payment-total-label {
    font-size: var(--text-md);
    opacity: 0.9;
    margin-bottom: var(--space-1);
  }

  .payment-total-amount {
    font-size: var(--text-3xl);
    font-weight: var(--font-weight-bold);
  }

  /* ── Method selector ── */
  .payment-methods {
    margin-bottom: var(--space-4);
  }

  .payment-method-label {
    display: block;
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
    margin-bottom: var(--space-2);
    font-weight: var(--font-weight-medium);
  }

  .payment-method-options {
    display: flex;
    gap: var(--space-2);
  }

  .payment-method-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-1);
    padding: var(--space-3) var(--space-2);
    border: 2px solid var(--color-border-subtle);
    border-radius: var(--radius-md);
    background: var(--color-bg-card);
    cursor: pointer;
    font-weight: var(--font-weight-medium);
    font-size: var(--text-sm);
    transition: all var(--transition-fast);
    position: relative;
    overflow: hidden;
  }

  .payment-method-btn:hover {
    border-color: var(--color-text-disabled);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }

  .payment-method-btn:active {
    transform: translateY(0);
  }

  .payment-method-btn.active {
    border-color: var(--color-primary);
    background: var(--color-primary-subtle);
    color: var(--color-primary);
    box-shadow: 0 0 0 1px var(--color-primary);
  }

  .payment-method-btn.active::after {
    content: '✓';
    position: absolute;
    top: 4px;
    right: 6px;
    font-size: 10px;
    background: var(--color-primary);
    color: white;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .payment-method-icon {
    font-size: var(--text-2xl);
  }

  /* ── Payment sections (shared) ── */
  .payment-section {
    margin-bottom: var(--space-4);
    padding: var(--space-3);
    background: var(--color-bg-surface);
    border-radius: var(--radius-md);
    border: 1px solid var(--color-border-subtle);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .payment-section-header {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    margin-bottom: var(--space-2);
  }

  .payment-section-icon {
    font-size: var(--text-xl);
  }

  .payment-section-title {
    font-weight: var(--font-weight-semibold);
    font-size: var(--text-md);
    color: var(--color-text-primary);
  }

  .payment-section-hint {
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
    margin-bottom: var(--space-3);
    padding-left: var(--space-6);
  }

  /* ── Cash amount input ── */
  .payment-amount {
    margin-bottom: var(--space-3);
  }

  .payment-amount-label {
    display: block;
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
    margin-bottom: var(--space-2);
    font-weight: var(--font-weight-medium);
  }

  .payment-amount-input-wrapper {
    display: flex;
    align-items: center;
    border: 2px solid var(--color-border-subtle);
    border-radius: var(--radius-md);
    overflow: hidden;
    transition: border-color var(--transition-fast);
  }

  .payment-amount-input-wrapper:focus-within {
    border-color: var(--color-primary);
  }

  .payment-amount-input-wrapper.field-error {
    border-color: var(--color-danger);
    animation: shake 0.4s ease;
  }

  .currency-symbol {
    padding: var(--space-3) var(--space-2) var(--space-3) var(--space-4);
    font-size: var(--text-xl);
    color: var(--color-text-disabled);
    font-weight: var(--font-weight-semibold);
  }

  .payment-amount-input {
    flex: 1;
    padding: 10px var(--space-3) 10px var(--space-1);
    border: none;
    outline: none;
    font-size: var(--text-md);
    font-weight: var(--font-weight-semibold);
    background: transparent;
  }

  /* ── Read-only amount display ── */
  .payment-amount-readonly {
    margin-bottom: var(--space-3);
  }

  .payment-amount-readonly-value {
    padding: 10px var(--space-3);
    background: var(--color-bg-subtle);
    border: 1px solid var(--color-border-subtle);
    border-radius: var(--radius-md);
    font-size: var(--text-lg);
    font-weight: var(--font-weight-bold);
    color: var(--color-primary);
  }

  /* ── Field hint text ── */
  .payment-field-hint {
    font-size: var(--text-xs);
    color: var(--color-text-disabled);
    margin-top: var(--space-1);
    padding-left: var(--space-1);
  }

  /* ── Inline error message ── */
  .field-error-message {
    color: var(--color-danger);
    font-size: var(--text-sm);
    margin-top: var(--space-1);
    padding-left: var(--space-1);
    font-weight: var(--font-weight-medium);
  }

  /* ── Change display ── */
  .payment-change {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3);
    background: var(--color-success-subtle);
    border-radius: var(--radius-md);
    border: 1px solid var(--color-success);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .change-icon {
    font-size: var(--text-2xl);
    color: var(--color-success);
  }

  .change-info {
    flex: 1;
  }

  .change-label {
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
  }

  .change-amount {
    font-size: var(--text-xl);
    font-weight: var(--font-weight-bold);
    color: var(--color-success);
  }

  /* ── M-Pesa section ── */
  .payment-mpesa-section {
    margin-bottom: var(--space-3);
  }

  /* ── M-Pesa status area ── */
  .payment-status-area {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3);
    background: var(--color-info-subtle);
    border: 1px solid var(--color-info);
    border-radius: var(--radius-md);
    margin-top: var(--space-3);
  }

  .status-spinner {
    width: 20px;
    height: 20px;
    border: 3px solid var(--color-border-subtle);
    border-top: 3px solid var(--color-info);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  .status-text {
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
  }

  /* ── Credit section ── */
  .credit-customer {
    margin-bottom: var(--space-3);
  }

  .credit-customer-wrapper {
    position: relative;
  }

  .credit-customer-select {
    width: 100%;
    padding: 10px var(--space-3);
    border: 2px solid var(--color-border-subtle);
    border-radius: var(--radius-md);
    font-size: var(--text-md);
    background: var(--color-bg-card);
    outline: none;
    transition: border-color var(--transition-fast);
    appearance: auto;
  }

  .credit-customer-select:focus {
    border-color: var(--color-primary);
  }

  .credit-customer-select.field-error {
    border-color: var(--color-danger);
    animation: shake 0.4s ease;
  }

  .credit-loading-spinner {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    border: 2px solid var(--color-border-subtle);
    border-top: 2px solid var(--color-primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .credit-error {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    background: var(--color-danger-subtle);
    border: 1px solid var(--color-danger);
    border-radius: var(--radius-sm);
    margin-top: var(--space-2);
    font-size: var(--text-sm);
    color: var(--color-danger);
  }

  .credit-retry-btn {
    padding: 2px 8px;
    border: 1px solid var(--color-danger);
    border-radius: var(--radius-sm);
    background: white;
    color: var(--color-danger);
    cursor: pointer;
    font-size: var(--text-xs);
    font-weight: var(--font-weight-medium);
  }

  .credit-retry-btn:hover {
    background: var(--color-danger);
    color: white;
  }

  .credit-balance {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    margin-top: var(--space-2);
    padding: var(--space-2) var(--space-3);
    background: var(--color-warning-subtle);
    border: 1px solid var(--color-warning);
    border-radius: var(--radius-sm);
  }

  .credit-balance-icon {
    font-size: var(--text-lg);
  }

  .credit-balance-info {
    flex: 1;
  }

  .credit-balance-label {
    font-size: var(--text-xs);
    color: var(--color-text-secondary);
  }

  .credit-balance-amount {
    font-size: var(--text-md);
    font-weight: var(--font-weight-bold);
    color: var(--color-warning);
  }

  .credit-note {
    margin-top: var(--space-2);
  }

  .credit-notes-input {
    width: 100%;
    padding: var(--space-2) var(--space-3);
    border: 2px solid var(--color-border-subtle);
    border-radius: var(--radius-md);
    font-size: var(--text-sm);
    outline: none;
    resize: vertical;
    font-family: inherit;
    transition: border-color var(--transition-fast);
  }

  .credit-notes-input:focus {
    border-color: var(--color-primary);
  }

  /* ── Split section ── */
  .split-progress-container {
    margin-bottom: var(--space-3);
  }

  .split-progress-bar {
    height: 8px;
    background: var(--color-bg-subtle);
    border-radius: var(--radius-full);
    overflow: hidden;
    margin-bottom: var(--space-2);
  }

  .split-progress-fill {
    height: 100%;
    border-radius: var(--radius-full);
    transition: width 0.5s ease, background 0.5s ease;
  }

  .split-progress-text {
    display: flex;
    justify-content: space-between;
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
  }

  .split-remaining-danger {
    color: var(--color-danger);
  }

  .split-remaining-success {
    color: var(--color-success);
  }

  .split-add-row {
    display: flex;
    gap: var(--space-2);
    align-items: flex-end;
    margin-bottom: var(--space-3);
  }

  .split-add-field {
    flex: 1;
  }

  .split-add-label {
    display: block;
    font-size: var(--text-xs);
    color: var(--color-text-secondary);
    margin-bottom: var(--space-1);
    font-weight: var(--font-weight-medium);
  }

  .split-method-select {
    width: 100%;
    padding: 8px var(--space-2);
    border: 2px solid var(--color-border-subtle);
    border-radius: var(--radius-md);
    font-size: var(--text-sm);
    background: var(--color-bg-card);
    outline: none;
  }

  .split-method-select:focus {
    border-color: var(--color-primary);
  }

  .split-amount-input {
    width: 100%;
    padding: 8px var(--space-2);
    border: 2px solid var(--color-border-subtle);
    border-radius: var(--radius-md);
    font-size: var(--text-sm);
    outline: none;
  }

  .split-amount-input:focus {
    border-color: var(--color-primary);
  }

  .split-add-btn {
    padding: 8px 16px;
    white-space: nowrap;
    height: 38px;
  }

  .split-list-container {
    margin-top: var(--space-2);
  }

  .split-list-label {
    display: block;
    font-size: var(--text-xs);
    color: var(--color-text-secondary);
    margin-bottom: var(--space-1);
    font-weight: var(--font-weight-medium);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .split-list {
    max-height: 150px;
    overflow-y: auto;
  }

  .split-empty {
    text-align: center;
    padding: var(--space-3);
    color: var(--color-text-disabled);
    font-size: var(--text-sm);
    font-style: italic;
  }

  .split-item {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-2);
    background: var(--color-bg-card);
    border: 1px solid var(--color-border-subtle);
    border-radius: var(--radius-sm);
    margin-bottom: var(--space-1);
    transition: all var(--transition-fast);
  }

  .split-item:hover {
    border-color: var(--color-text-disabled);
  }

  .split-item-info {
    display: flex;
    align-items: center;
    gap: var(--space-1);
    flex: 1;
  }

  .split-item-icon {
    font-size: var(--text-md);
  }

  .split-item-method {
    font-size: var(--text-sm);
    font-weight: var(--font-weight-medium);
    color: var(--color-text-primary);
  }

  .split-item-amount {
    font-size: var(--text-sm);
    font-weight: var(--font-weight-semibold);
    color: var(--color-primary);
  }

  .split-remove-btn {
    padding: 2px 6px;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--color-text-disabled);
    font-size: var(--text-lg);
    transition: color var(--transition-fast);
    line-height: 1;
  }

  .split-remove-btn:hover {
    color: var(--color-danger);
  }

  .split-remove-icon {
    display: block;
  }

  /* ── Payment summary row ── */
  .payment-summary {
    border-top: 1px solid var(--color-border-subtle);
    padding-top: var(--space-3);
    margin-bottom: var(--space-4);
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: var(--space-1) 0;
    font-size: var(--text-md);
  }

  .summary-label {
    color: var(--color-text-secondary);
  }

  .summary-value {
    font-weight: var(--font-weight-medium);
    color: var(--color-text-primary);
  }

  .summary-total {
    font-weight: var(--font-weight-bold);
    color: var(--color-primary);
    font-size: var(--text-lg);
  }

  /* ── Confirm button with loading state ── */
  .modal-actions {
    display: flex;
    gap: var(--space-2);
    justify-content: flex-end;
  }

  .modal-btn {
    padding: 10px 24px;
    border: none;
    border-radius: var(--radius-md);
    font-size: var(--text-md);
    font-weight: var(--font-weight-semibold);
    cursor: pointer;
    transition: all var(--transition-fast);
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }

  .modal-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .modal-btn-primary {
    background: var(--color-primary);
    color: var(--color-text-on-primary);
  }

  .modal-btn-primary:hover:not(:disabled) {
    background: var(--color-primary-hover);
  }

  .modal-btn-primary.btn--loading {
    background: var(--color-primary-hover);
  }

  .modal-btn-secondary {
    background: var(--color-bg-subtle);
    color: var(--color-text-primary);
  }

  .modal-btn-secondary:hover {
    background: var(--color-border-subtle);
  }

  .btn-spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top: 2px solid white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* ── Animations ── */
  @keyframes spin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
    20%, 40%, 60%, 80% { transform: translateX(4px); }
  }

  @keyframes methodPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateX(-10px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  @keyframes slideOut {
    from {
      opacity: 1;
      transform: translateX(0);
    }
    to {
      opacity: 0;
      transform: translateX(10px);
    }
  }

  /* ── 768px ── */
  @media (min-width: 768px) {
    .payment-total-amount { font-size: var(--text-3xl); }

    .payment-method-btn {
      padding: var(--space-3) var(--space-2);
      font-size: var(--text-sm);
    }

    .payment-method-icon { font-size: var(--text-2xl); }

    .payment-amount-input {
      font-size: var(--text-xl);
      padding: var(--space-3) var(--space-4) var(--space-3) var(--space-1);
    }

    .change-amount { font-size: var(--text-2xl); }
  }

  /* ── 1024px ── */
  @media (min-width: 1024px) {
    .payment-total-amount { font-size: var(--text-3xl); }

    .payment-method-btn {
      padding: var(--space-3) var(--space-2);
      font-size: var(--text-sm);
    }

    .payment-method-icon { font-size: var(--text-2xl); }

    .payment-amount-input {
      font-size: var(--text-xl);
      padding: var(--space-3) var(--space-4) var(--space-3) var(--space-1);
    }

    .change-amount { font-size: var(--text-2xl); }
  }
</style>
