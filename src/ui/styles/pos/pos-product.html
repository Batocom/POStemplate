<style>
  /* =====================================================
     POS PRODUCTS
     Scope: .product-grid, .product-card, .product-search,
            .search-*, .category-*
     ===================================================== */

  /* ── Category filters ── */
  .category-filters {
    display: flex;
    gap: var(--space-1);
    margin-bottom: var(--space-4);
    flex-wrap: wrap;
  }

  .category-btn {
    padding: 3px 10px;
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-full);
    background: var(--color-bg-card);
    cursor: pointer;
    font-size: var(--text-xs);
    transition: all var(--transition-fast);
  }

  .category-btn:hover {
    background: var(--color-bg-subtle);
  }

  .category-btn.active {
    background: var(--color-primary);
    color: var(--color-text-on-primary);
    border-color: var(--color-primary);
  }

  /* ── Product grid ── */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-1);
  }

  /* ── Product card ── */
  .product-card {
    background: var(--color-bg-card);
    border: 1px solid var(--color-border-subtle);
    border-radius: var(--radius-md);
    padding: var(--space-1);
    cursor: pointer;
    transition: all var(--transition-fast);
    text-align: center;
  }

  .product-card:hover {
    border-color: var(--color-primary);
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }

  .product-card .product-name {
    font-weight: var(--font-weight-semibold);
    font-size: var(--text-xs);
    margin-bottom: var(--space-1);
    color: var(--color-text-primary);
  }

  .product-card .product-price {
    color: var(--color-primary);
    font-weight: var(--font-weight-bold);
    font-size: var(--text-sm);
  }

  .product-card .product-stock {
    font-size: var(--text-xs);
    color: var(--color-text-disabled);
    margin-top: var(--space-1);
  }

  .product-card .product-barcode {
    font-size: var(--text-xs);
    color: var(--color-text-disabled);
    margin-top: 2px;
  }

  /* ── Search bar ── */
  .product-search {
    position: relative;
    margin-bottom: var(--space-4);
  }

  .search-input-wrapper {
    display: flex;
    align-items: center;
    background: var(--color-bg-card);
    border: 2px solid var(--color-border-subtle);
    border-radius: var(--radius-md);
    transition: border-color var(--transition-fast);
  }

  .search-input-wrapper:focus-within {
    border-color: var(--color-primary);
  }

  .search-input {
    flex: 1;
    padding: 10px var(--space-3);
    border: none;
    outline: none;
    font-size: var(--text-md);
    background: transparent;
  }

  .search-clear-btn {
    padding: var(--space-2) var(--space-3);
    border: none;
    background: none;
    cursor: pointer;
    font-size: var(--text-xl);
    color: var(--color-text-disabled);
  }

  /* ── Search results dropdown ── */
  .search-results {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--color-bg-card);
    border: 1px solid var(--color-border-subtle);
    border-radius: 0 0 var(--radius-md) var(--radius-md);
    box-shadow: var(--shadow-lg);
    z-index: var(--z-dropdown);
    max-height: 300px;
    overflow-y: auto;
  }

  .search-result-item {
    padding: 10px var(--space-4);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--color-bg-subtle);
    transition: background var(--transition-fast);
  }

  .search-result-item:hover {
    background: var(--color-primary-subtle);
  }

  .search-result-item:last-child {
    border-bottom: none;
  }

  .search-result-item .result-name {
    font-weight: var(--font-weight-medium);
  }

  .search-result-item .result-price {
    color: var(--color-primary);
    font-weight: var(--font-weight-semibold);
  }

  .search-result-item .result-stock {
    font-size: var(--text-sm);
    color: var(--color-text-disabled);
  }

  /* ── 480px ── */
  @media (min-width: 480px) {
    .product-grid {
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 6px;
    }

    .product-card {
      padding: 6px;
    }

    .product-card .product-name  { font-size: var(--text-xs); }
    .product-card .product-price { font-size: var(--text-md); }
    .product-card .product-stock { font-size: var(--text-xs); }
    .product-card .product-barcode { font-size: var(--text-xs); }

    .category-filters { gap: var(--space-2); }

    .category-btn {
      padding: var(--space-1) var(--space-3);
      font-size: var(--text-xs);
    }
  }

  /* ── 768px ── */
  @media (min-width: 768px) {
    .product-grid {
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: var(--space-2);
    }

    .product-card { padding: var(--space-2); }
    .product-card .product-name  { font-size: var(--text-sm); }
    .product-card .product-price { font-size: var(--text-md); }
    .product-card .product-stock { font-size: var(--text-xs); }
    .product-card .product-barcode { font-size: var(--text-xs); }

    .search-input {
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-md);
    }

    .category-btn {
      padding: 6px var(--space-4);
      font-size: var(--text-sm);
    }
  }

  /* ── 1024px ── */
  @media (min-width: 1024px) {
    .product-grid {
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: var(--space-3);
    }

    .product-card { padding: var(--space-3); }
    .product-card .product-name  { font-size: var(--text-md); }
    .product-card .product-price { font-size: var(--text-lg); }
    .product-card .product-stock { font-size: var(--text-xs); }
    .product-card .product-barcode { font-size: var(--text-xs); }

    .search-input {
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-md);
    }

    .category-btn {
      padding: 6px var(--space-4);
      font-size: var(--text-sm);
    }
  }

  /* ── 1280px ── */
  @media (min-width: 1280px) {
    .product-grid {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }
  }
</style>
