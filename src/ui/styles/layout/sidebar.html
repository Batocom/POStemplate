<style>
/* ===== SIDEBAR NAVIGATION ===== */
/* Pattern: N-01 — Sidebar Navigation */
/* RESPONSIVE_PATTERNS.md Sections 7.1, 7.2 — Sidebar Behavior, Mobile Navigation Drawer */

/* ===== SIDEBAR CONTAINER ===== */
/* Default (mobile): off-screen, fixed position, full height */
.sidebar {
  position: fixed;
  top: var(--topbar-height);  /* Offset by topbar height */
  left: 0;
  height: calc(100dvh - var(--topbar-height));  /* Subtract topbar height */
  width: min(var(--sidebar-width), 80vw);
  background: var(--color-sidebar-bg);
  z-index: var(--z-sidebar);
  transform: translateX(-100%);
  transition: transform var(--transition-normal) var(--easing-default);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  border-right: 1px solid rgba(255, 255, 255, 0.1); /* Add visible border */
}

/* Open state: slide into view */
.sidebar--open {
  transform: translateX(0);
}

/* ===== SIDEBAR OVERLAY ===== */
/* Default (mobile): hidden, covers content behind sidebar */
.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: var(--color-overlay);
  opacity: 0;
  pointer-events: none;
  z-index: calc(var(--z-sidebar) - 1);
  transition: opacity var(--transition-normal) var(--easing-default);
}

/* Visible state: overlay fades in */
.sidebar-overlay--visible {
  opacity: 1;
  pointer-events: auto;
}

/* ===== SIDEBAR HEADER ===== */
.sidebar-header {
  padding: var(--space-4);
  border-bottom: 1px solid var(--color-sidebar-hover);
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 56px;
}

.sidebar-logo {
  font-size: var(--text-lg);
  font-weight: var(--font-weight-bold);
  color: var(--color-sidebar-text);
}

/* ===== NAVIGATION LIST ===== */
.sidebar-nav {
  flex: 1;
  padding: var(--space-3);
  list-style: none;
  margin: 0;
}

/* ===== NAV ITEM ===== */
.nav-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  min-height: 48px;
  padding: var(--space-3) var(--space-4);
  color: var(--color-sidebar-text);
  border-radius: var(--radius-md);
  text-decoration: none;
  cursor: pointer;
  transition: background var(--transition-fast) var(--easing-default);
  font-size: var(--text-sm);
  font-weight: var(--font-weight-medium);
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
}

.nav-item:hover {
  background: var(--color-sidebar-hover);
}

.nav-item:focus-visible {
  outline: 2px solid var(--color-primary);
  outline-offset: 2px;
}

/* Active state: distinct background */
.nav-item--active {
  background: var(--color-sidebar-active);
  font-weight: var(--font-weight-semibold);
}

/* ===== NAV ITEM ICON ===== */
.nav-item-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}

.nav-item-icon svg {
  width: 100%;
  height: 100%;
  fill: currentColor;
}

/* ===== NAV ITEM LABEL ===== */
.nav-item-label {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ===== SIDEBAR FOOTER ===== */
.sidebar-footer {
  padding: var(--space-3);
  border-top: 1px solid var(--color-sidebar-hover);
}
