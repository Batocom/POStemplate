<script>
/**
 * CartState — Single source of truth for the current sale
 * 
 * ONLY services modify CartState.
 * Pages/components should NEVER mutate directly.
 */
const CartState = {
  items: [],
  
  summary: {
    subtotal: 0,
    discount: 0,
    tax: 0,
    total: 0,
    profit: 0,
    itemCount: 0
  },
  
  customer: null,
  
  payment: {
    method: "cash",
    amountPaid: 0,
    balance: 0,
    change: 0,
    splits: [],
    ledger: 0
  },
  
  status: "idle", // idle | active | paying | completed | cancelled
  
  // Reset cart to initial state
  reset() {
    this.items = [];
    this.summary = {
      subtotal: 0,
      discount: 0,
      tax: 0,
      total: 0,
      profit: 0,
      itemCount: 0
    };
    this.customer = null;
    this.payment = {
      method: "cash",
      amountPaid: 0,
      balance: 0,
      change: 0
    };
    this.status = "idle";
  },
  
  // Get item by product ID
  getItem(productId) {
    return this.items.find(item => item.productId === productId);
  },
  
  // Check if cart has items
  hasItems() {
    return this.items.length > 0;
  },
  
  // Get total quantity of items
  getTotalQuantity() {
    return this.items.reduce((sum, item) => sum + item.quantity, 0);
  },
  
  // Add a split payment
  addSplit(method, amount) {
    this.payment.splits.push({ method, amount });
    this.payment.ledger += amount;
  },
  
  // Clear all split payments
  clearSplits() {
    this.payment.splits = [];
    this.payment.ledger = 0;
  },
  
  // Get remaining amount to be paid
  getRemaining() {
    const total = this.summary.total;
    return Math.max(0, total - this.payment.ledger);
  },
  
  // Check if fully paid via splits
  isFullyPaid() {
    return this.payment.ledger >= this.summary.total;
  }
};
</script>
