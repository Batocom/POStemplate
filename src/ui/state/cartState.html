<script>
/**
 * CartState — Single source of truth for the current sale
 * 
 * ONLY services modify CartState.
 * Pages/components should NEVER mutate directly.
 */
const CartState = {
  items: [],
  
  summary: {
    subtotal: 0,
    discount: 0,
    tax: 0,
    total: 0,
    itemCount: 0
  },
  
  customer: null,
  
  payment: {
    method: "cash",
    amountPaid: 0,
    balance: 0,
    change: 0
  },
  
  status: "idle", // idle | active | paying | completed | cancelled
  
  // Reset cart to initial state
  reset() {
    this.items = [];
    this.summary = {
      subtotal: 0,
      discount: 0,
      tax: 0,
      total: 0,
      itemCount: 0
    };
    this.customer = null;
    this.payment = {
      method: "cash",
      amountPaid: 0,
      balance: 0,
      change: 0
    };
    this.status = "idle";
  },
  
  // Get item by product ID
  getItem(productId) {
    return this.items.find(item => item.productId === productId);
  },
  
  // Check if cart has items
  hasItems() {
    return this.items.length > 0;
  },
  
  // Get total quantity of items
  getTotalQuantity() {
    return this.items.reduce((sum, item) => sum + item.quantity, 0);
  }
};
</script>
