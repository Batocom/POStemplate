<template id="dashboardPageTemplate">
  <div class="space-y-6">
    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div class="bg-white p-6 rounded-xl shadow">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500">Today's Sales</p>
            <p id="todaySales" class="text-2xl font-bold mt-1">KES 0</p>
          </div>
          <div class="bg-blue-100 p-3 rounded-full">
            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="bg-white p-6 rounded-xl shadow">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500">Total Products</p>
            <p id="totalProducts" class="text-2xl font-bold mt-1">0</p>
          </div>
          <div class="bg-green-100 p-3 rounded-full">
            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="bg-white p-6 rounded-xl shadow">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500">Total Profit</p>
            <p id="totalProfit" class="text-2xl font-bold mt-1">KES 0</p>
          </div>
          <div class="bg-purple-100 p-3 rounded-full">
            <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="bg-white p-6 rounded-xl shadow">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500">Low Stock Alerts</p>
            <p id="lowStockCount" class="text-2xl font-bold mt-1">0</p>
          </div>
          <div class="bg-red-100 p-3 rounded-full">
            <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- Sales Chart -->
      <div class="bg-white p-6 rounded-xl shadow">
        <h3 class="text-lg font-semibold mb-4">Sales (Last 7 Days)</h3>
        <div id="salesChartContainer" class="h-64">
          <canvas id="salesChart"></canvas>
        </div>
      </div>

      <!-- Stock Levels Donut -->
      <div class="bg-white p-6 rounded-xl shadow">
        <h3 class="text-lg font-semibold mb-4">Stock Levels by Category</h3>
        <div id="stockChartContainer" class="h-64 flex items-center justify-center">
          <canvas id="stockChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Low Stock Products -->
    <div class="bg-white p-6 rounded-xl shadow">
      <h3 class="text-lg font-semibold mb-4">Low Stock Products</h3>
      <div id="lowStockContainer">
        <p class="text-gray-500">No low stock products</p>
      </div>
    </div>

    <!-- Recent Transactions -->
    <div class="bg-white p-6 rounded-xl shadow">
      <h3 class="text-lg font-semibold mb-4">Recent Transactions</h3>
      <div id="recentTransactionsContainer">
        <p class="text-gray-500">No recent transactions</p>
      </div>
    </div>
  </div>
</template>

<script>
function renderDashboardPage() {
  const template = document.getElementById('dashboardPageTemplate');
  if (template) {
    renderAppShell(template.innerHTML);
    loadDashboardData();
  } else {
    renderAppShell('<div class="text-red-500">Error loading dashboard</div>');
  }
}

async function loadDashboardData() {
  try {
    const raw = await api('GET_DASHBOARD_DATA');
    const response = typeof raw === "string" ? JSON.parse(raw) : raw;
    
    if (!response || !response.success) {
      Toast.error('Failed to load dashboard data');
      return;
    }
    
    const data = response.data;
    
    // Update stats cards
    document.getElementById('todaySales').textContent = 'KES ' + Number(data.todayTotal).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    document.getElementById('totalProducts').textContent = data.totalProducts;
    document.getElementById('totalProfit').textContent = 'KES ' + Number(data.totalProfit).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    document.getElementById('lowStockCount').textContent = data.lowStockProducts.length;
    
    // Render sales chart
    renderSalesChart(data.salesChart);
    
    // Render stock donut chart
    renderStockChart(data.stockByCategory);
    
    // Render low stock products
    renderLowStockProducts(data.lowStockProducts);
    
    // Render recent transactions
    renderRecentTransactions(data.last5Sales);
    
  } catch (error) {
    console.error(error);
    Toast.error('Failed to load dashboard: ' + error.message);
  }
}

function renderSalesChart(chartData) {
  const canvas = document.getElementById('salesChart');
  if (!canvas || !chartData || chartData.length === 0) return;
  
  const ctx = canvas.getContext('2d');
  const parent = canvas.parentElement;
  canvas.width = parent.clientWidth - 32;
  canvas.height = parent.clientHeight - 16;
  
  const width = canvas.width;
  const height = canvas.height;
  const padding = { top: 20, right: 20, bottom: 40, left: 60 };
  const chartWidth = width - padding.left - padding.right;
  const chartHeight = height - padding.top - padding.bottom;
  
  const maxValue = Math.max.apply(null, chartData.map(function(d) { return d.total; })) || 1;
  const barWidth = chartWidth / chartData.length * 0.6;
  const gap = chartWidth / chartData.length * 0.4;
  
  // Clear
  ctx.clearRect(0, 0, width, height);
  
  // Draw grid lines
  ctx.strokeStyle = '#e5e7eb';
  ctx.lineWidth = 1;
  for (var i = 0; i <= 4; i++) {
    var y = padding.top + (chartHeight / 4) * i;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(width - padding.right, y);
    ctx.stroke();
    
    // Y-axis labels
    ctx.fillStyle = '#9ca3af';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('KES ' + Math.round((maxValue / 4) * (4 - i)), padding.left - 8, y + 4);
  }
  
  // Draw bars
  chartData.forEach(function(item, index) {
    var barHeight = (item.total / maxValue) * chartHeight;
    var x = padding.left + (chartWidth / chartData.length) * index + gap / 2;
    var y = padding.top + chartHeight - barHeight;
    
    // Bar
    var gradient = ctx.createLinearGradient(x, y, x, padding.top + chartHeight);
    gradient.addColorStop(0, '#3b82f6');
    gradient.addColorStop(1, '#93c5fd');
    ctx.fillStyle = gradient;
    ctx.fillRect(x, y, barWidth, barHeight);
    
    // X-axis labels
    ctx.fillStyle = '#6b7280';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(item.date.split(',')[0], x + barWidth / 2, height - padding.bottom + 16);
  });
}

function renderStockChart(stockData) {
  const canvas = document.getElementById('stockChart');
  if (!canvas || !stockData || stockData.length === 0) return;
  
  const ctx = canvas.getContext('2d');
  const parent = canvas.parentElement;
  canvas.width = 220;
  canvas.height = 220;
  
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const radius = 90;
  
  const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316'];
  
  var totalStock = stockData.reduce(function(sum, d) { return sum + d.stock; }, 0);
  if (totalStock === 0) {
    ctx.fillStyle = '#9ca3af';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No stock data', centerX, centerY);
    return;
  }
  
  var startAngle = -Math.PI / 2;
  
  stockData.forEach(function(item, index) {
    var sliceAngle = (item.stock / totalStock) * Math.PI * 2;
    
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
    ctx.closePath();
    ctx.fillStyle = colors[index % colors.length];
    ctx.fill();
    
    startAngle += sliceAngle;
  });
  
  // Center hole (donut)
  ctx.beginPath();
  ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  
  // Center text
  ctx.fillStyle = '#374151';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(totalStock, centerX, centerY - 4);
  ctx.fillStyle = '#9ca3af';
  ctx.font = '11px sans-serif';
  ctx.fillText('Total Stock', centerX, centerY + 14);
  
  // Legend
  var legendY = 10;
  stockData.forEach(function(item, index) {
    ctx.fillStyle = colors[index % colors.length];
    ctx.fillRect(10, legendY, 12, 12);
    ctx.fillStyle = '#374151';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(item.name + ' (' + item.stock + ')', 28, legendY + 10);
    legendY += 20;
  });
}

function renderLowStockProducts(products) {
  const container = document.getElementById('lowStockContainer');
  if (!container) return;
  
  if (!products || products.length === 0) {
    container.innerHTML = '<p class="text-gray-500">No low stock products</p>';
    return;
  }
  
  var html = '<div class="overflow-x-auto"><table class="w-full text-left">';
  html += '<thead><tr class="border-b">';
  html += '<th class="py-2">Product</th>';
  html += '<th class="py-2">Stock</th>';
  html += '<th class="py-2">Status</th>';
  html += '</tr></thead><tbody>';
  
  products.forEach(function(product) {
    var stock = Number(product.stock || 0);
    var statusClass = stock === 0 ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800';
    var statusText = stock === 0 ? 'Out of Stock' : 'Low Stock';
    
    html += '<tr class="border-b hover:bg-gray-50">';
    html += '<td class="py-2">' + product.name + '</td>';
    html += '<td class="py-2">' + stock + '</td>';
    html += '<td class="py-2"><span class="px-2 py-1 rounded text-sm ' + statusClass + '">' + statusText + '</span></td>';
    html += '</tr>';
  });
  
  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function renderRecentTransactions(sales) {
  const container = document.getElementById('recentTransactionsContainer');
  if (!container) return;
  
  if (!sales || sales.length === 0) {
    container.innerHTML = '<p class="text-gray-500">No recent transactions</p>';
    return;
  }
  
  var html = '<div class="overflow-x-auto"><table class="w-full text-left">';
  html += '<thead><tr class="border-b">';
  html += '<th class="py-2">Invoice</th>';
  html += '<th class="py-2">Customer</th>';
  html += '<th class="py-2">Amount</th>';
  html += '<th class="py-2">Payment</th>';
  html += '<th class="py-2">Date</th>';
  html += '</tr></thead><tbody>';
  
  sales.forEach(function(sale) {
    var paymentColors = {
      'cash': 'text-green-600',
      'card': 'text-blue-600',
      'transfer': 'text-purple-600'
    };
    var paymentClass = paymentColors[sale.payment_method] || 'text-gray-600';
    
    html += '<tr class="border-b hover:bg-gray-50">';
    html += '<td class="py-2 font-medium">' + sale.invoice_no + '</td>';
    html += '<td class="py-2">' + sale.customer_name + '</td>';
    html += '<td class="py-2">KES ' + Number(sale.total_amount).toFixed(2) + '</td>';
    html += '<td class="py-2"><span class="' + paymentClass + ' font-medium">' + sale.payment_method + '</span></td>';
    html += '<td class="py-2 text-gray-500">' + new Date(sale.created_at).toLocaleDateString() + '</td>';
    html += '</tr>';
  });
  
  html += '</tbody></table></div>';
  container.innerHTML = html;
}
</script>
