<template id="settingsPageTemplate">
  <div class="space-y-6">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold">Settings</h1>
        <p class="text-gray-500">Configure system settings</p>
      </div>
    </div>
    
    <!-- Tax Rate Settings -->
    <div class="bg-white rounded shadow p-6">
      <h2 class="text-lg font-bold mb-4">Tax Configuration</h2>
      <p class="text-gray-500 text-sm mb-4">Set the tax rate applied to all sales transactions.</p>
      
      <div class="max-w-md">
        <label class="block text-sm font-medium text-gray-700 mb-2">Tax Rate (%)</label>
        <div class="flex gap-2 items-center">
          <input
            id="taxRateInput"
            type="number"
            step="0.01"
            min="0"
            max="100"
            class="w-32 border-2 border-gray-300 rounded-lg px-4 py-3 text-lg font-bold focus:border-blue-500 focus:outline-none"
            placeholder="8"
          />
          <span class="text-lg font-bold text-gray-600">%</span>
          <button
            onclick="SettingsController.saveTaxRate()"
            id="saveTaxBtn"
            class="bg-blue-600 text-white px-6 py-3 rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50"
          >
            Save
          </button>
        </div>
        <p class="text-xs text-gray-400 mt-2">Current rate: <span id="currentTaxRateDisplay">8%</span></p>
      </div>
    </div>
    
    <!-- System Info -->
    <div class="bg-white rounded shadow p-6">
      <h2 class="text-lg font-bold mb-4">System Information</h2>
      <div class="space-y-2 text-sm">
        <div class="flex justify-between max-w-md">
          <span class="text-gray-500">Version</span>
          <span class="font-medium">1.0.0</span>
        </div>
        <div class="flex justify-between max-w-md">
          <span class="text-gray-500">Database</span>
          <span class="font-medium">Google Sheets</span>
        </div>
        <div class="flex justify-between max-w-md">
          <span class="text-gray-500">Last Migration</span>
          <span class="font-medium" id="lastMigrationDate">-</span>
        </div>
      </div>
    </div>
  </div>
</template>
