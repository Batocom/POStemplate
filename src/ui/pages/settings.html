<template id="settingsPageTemplate">
  <div class="page-header">
    <div>
      <h1 class="page-header__title">Settings</h1>
      <p class="page-header__subtitle">Configure system settings</p>
    </div>
  </div>
  
  <!-- Tax Rate Settings -->
  <div class="card card--lg">
    <h2 class="card__title">Tax Configuration</h2>
    <p class="card__description">Set the tax rate applied to all sales transactions.</p>
    
    <div class="form-group">
      <label for="taxRateInput" class="form-label">Tax Rate (%)</label>
      <div class="flex gap-2 items-center">
        <input
          id="taxRateInput"
          type="number"
          step="0.01"
          min="0"
          max="100"
          class="form-input"
          placeholder="0"
        />
        <span class="text-lg font-bold text-secondary">%</span>
        <button
          onclick="SettingsController.saveTaxRate()"
          id="saveTaxBtn"
          class="btn btn--primary btn--lg"
        >
          Save
        </button>
      </div>
      <p class="text-xs text-disabled mt-2">Current rate: <span id="currentTaxRateDisplay">0%</span></p>
    </div>
  </div>
  
  <!-- System Info -->
  <div class="card card--lg">
    <h2 class="card__title">System Information</h2>
    <div class="space-y-2 text-sm">
      <div class="flex justify-between max-w-md">
        <span class="text-secondary">Version</span>
        <span class="font-medium">1.0.0</span>
      </div>
      <div class="flex justify-between max-w-md">
        <span class="text-secondary">Database</span>
        <span class="font-medium">Google Sheets</span>
      </div>
      <div class="flex justify-between max-w-md">
        <span class="text-secondary">Last Migration</span>
        <span class="font-medium" id="lastMigrationDate">-</span>
      </div>
    </div>
  </div>
</template>
