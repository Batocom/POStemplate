<div id="salesPageTemplate" style="display:none;">
  <div class="sales-page">
    <div class="page-header">
      <h1 class="text-2xl font-bold">Sales History</h1>
      <div class="page-actions">
        <button class="bg-blue-600 text-white px-4 py-2 rounded" onclick="Router.go('pos')">
          New Sale
        </button>
      </div>
    </div>
    
    <!-- Filters -->
    <div class="filters-bar">
      <div class="filter-group">
        <label>From</label>
        <input type="date" id="filter-start-date" class="filter-input">
      </div>
      <div class="filter-group">
        <label>To</label>
        <input type="date" id="filter-end-date" class="filter-input">
      </div>
      <div class="filter-group">
        <label>Payment Method</label>
        <select id="filter-payment-method" class="filter-input">
          <option value="">All</option>
          <option value="cash">Cash</option>
          <option value="card">Card</option>
          <option value="transfer">Transfer</option>
        </select>
      </div>
      <button class="bg-gray-200 px-4 py-2 rounded" onclick="SalesPage.applyFilters()">
        Apply Filters
      </button>
      <button class="bg-gray-100 px-4 py-2 rounded" onclick="SalesPage.resetFilters()">
        Reset
      </button>
    </div>
    
    <!-- Sales Table -->
    <div class="table-container">
      <table class="data-table" id="sales-table">
        <thead>
          <tr>
            <th>Invoice</th>
            <th>Customer</th>
            <th>Total</th>
            <th>Payment</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="sales-table-body">
          <!-- Rows rendered here -->
        </tbody>
      </table>
    </div>
    
    <!-- Empty state -->
    <div id="sales-empty" class="empty-state" style="display:none;">
      <div class="empty-icon">&#128202;</div>
      <p>No sales found</p>
      <p class="empty-hint">Start by making a sale in the POS</p>
    </div>
  </div>
</div>

<style>
  .sales-page {
    padding: 24px;
  }
  
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  
  .filters-bar {
    display: flex;
    gap: 16px;
    align-items: flex-end;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  
  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  
  .filter-group label {
    font-size: 0.85rem;
    color: #666;
  }
  
  .filter-input {
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 0.9rem;
  }
  
  .table-container {
    overflow-x: auto;
  }
  
  .data-table {
    width: 100%;
    border-collapse: collapse;
  }
  
  .data-table th {
    text-align: left;
    padding: 12px 16px;
    background: #f8f9fa;
    border-bottom: 2px solid #e0e0e0;
    font-weight: 600;
    font-size: 0.85rem;
    color: #666;
    text-transform: uppercase;
  }
  
  .data-table td {
    padding: 12px 16px;
    border-bottom: 1px solid #f0f0f0;
  }
  
  .data-table tr:hover {
    background: #f8f9fa;
  }
  
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #888;
  }
  
  .empty-state .empty-icon {
    font-size: 3rem;
    margin-bottom: 12px;
  }
  
  .empty-state p {
    margin: 4px 0;
  }
  
  .empty-state .empty-hint {
    font-size: 0.85rem;
    color: #aaa;
  }
  
  .action-btn {
    padding: 4px 12px;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: white;
    cursor: pointer;
    font-size: 0.85rem;
  }
  
  .action-btn:hover {
    background: #f0f0f0;
  }
</style>

<script>
/**
 * Sales Page Controller
 */
const SalesPage = {
  sales: [],
  
  async init() {
    try {
      await this.loadSales();
    } catch (error) {
      Toast.error("Failed to load sales: " + error.message);
    }
  },
  
  async loadSales() {
    const raw = await api("GET_SALES");
    const response = typeof raw === "string" ? JSON.parse(raw) : raw;
    
    if (response.success) {
      this.sales = (response.data || []).sort((a, b) => 
        new Date(b.created_at) - new Date(a.created_at)
      );
      this.render();
    } else {
      throw new Error(response.error || "Failed to load sales");
    }
  },
  
  render() {
    const tbody = document.getElementById("sales-table-body");
    const empty = document.getElementById("sales-empty");
    const table = document.getElementById("sales-table");
    
    if (!tbody || !empty) return;
    
    if (this.sales.length === 0) {
      if (table) table.style.display = "none";
      empty.style.display = "block";
      return;
    }
    
    if (table) table.style.display = "table";
    empty.style.display = "none";
    
    tbody.innerHTML = this.sales.map(sale => `
      <tr>
        <td><strong>${sale.invoice_no}</strong></td>
        <td>${sale.customer_name}</td>
        <td>KES ${Number(sale.total_amount).toFixed(2)}</td>
        <td><span class="payment-badge payment-${sale.payment_method}">${sale.payment_method}</span></td>
        <td>${new Date(sale.created_at).toLocaleDateString()}</td>
        <td>
          <button class="action-btn" onclick="SalesPage.viewReceipt('${sale.id}')">Receipt</button>
        </td>
      </tr>
    `).join("");
  },
  
  async viewReceipt(saleId) {
    try {
      Modal.loading("Loading sale details...");
      
      const raw = await api("GET_SALE_BY_ID", { saleId });
      const response = typeof raw === "string" ? JSON.parse(raw) : raw;
      
      if (response.success) {
        const { sale, items } = response.data;
        
        // Populate modal with sale details
        document.getElementById("modal-invoice").textContent = sale.invoice_no;
        document.getElementById("modal-customer").textContent = sale.customer_name;
        document.getElementById("modal-date").textContent = new Date(sale.created_at).toLocaleDateString();
        document.getElementById("modal-payment").textContent = sale.payment_method;
        document.getElementById("modal-total").textContent = `KES ${Number(sale.total_amount).toFixed(2)}`;
        
        // Render items
        const itemsBody = document.getElementById("modal-items-body");
        itemsBody.innerHTML = items.map(item => `
          <tr>
            <td>${item.product_id}</td>
            <td>${item.quantity}</td>
            <td>KES ${Number(item.price).toFixed(2)}</td>
            <td>KES ${Number(item.subtotal).toFixed(2)}</td>
          </tr>
        `).join("");
        
        Modal.close();
        Modal.open({
          title: `Sale - ${sale.invoice_no}`,
          content: document.getElementById("salesModalContent").innerHTML,
          size: "lg"
        });
      } else {
        Modal.close();
        Toast.error(response.error || "Failed to load sale details");
      }
    } catch (error) {
      Modal.close();
      Toast.error("Failed to load sale details: " + error.message);
    }
  },
  
  applyFilters() {
    // TODO: Implement server-side filtering
    Toast.info("Filtering not yet implemented");
  },
  
  resetFilters() {
    document.getElementById("filter-start-date").value = "";
    document.getElementById("filter-end-date").value = "";
    document.getElementById("filter-payment-method").value = "";
    this.loadSales();
  }
};
</script>
