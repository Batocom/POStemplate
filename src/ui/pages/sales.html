<template id="salesPageTemplate">
  <div class="space-y-4">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold">Sales History</h1>
        <p class="text-gray-500">View all completed sales</p>
      </div>
      <button
        onclick="Router.go('pos')"
        class="bg-blue-600 text-white px-4 py-2 rounded"
      >
        New Sale
      </button>
    </div>
    <div
      id="salesTableContainer"
      class="bg-white rounded shadow p-4"
    >
      Loading sales...
    </div>
  </div>
</template>

<!-- Receipt Modal Content (hidden, used by viewSaleReceipt) -->
<div id="salesModalContent" style="display:none;">
  <div class="receipt">
    <div class="receipt__header">
      <div class="receipt__field">
        <span class="receipt__label">Invoice:</span>
        <span id="modal-invoice" class="receipt__value"></span>
      </div>
      <div class="receipt__field">
        <span class="receipt__label">Customer:</span>
        <span id="modal-customer" class="receipt__value"></span>
      </div>
      <div class="receipt__field">
        <span class="receipt__label">Date:</span>
        <span id="modal-date" class="receipt__value"></span>
      </div>
      <div class="receipt__field">
        <span class="receipt__label">Payment:</span>
        <span id="modal-payment" class="receipt__value"></span>
      </div>
    </div>
    
    <div class="receipt__items">
      <h4 class="receipt__section-title">Items</h4>
      <table class="receipt__table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Subtotal</th>
          </tr>
        </thead>
        <tbody id="modal-items-body">
          <!-- Items rendered here -->
        </tbody>
      </table>
    </div>
    
    <div class="receipt__totals">
      <div class="receipt__total-row">
        <span class="receipt__total-label">Total Amount</span>
        <span id="modal-total" class="receipt__total-value"></span>
      </div>
    </div>
    
    <div class="receipt__actions">
      <button onclick="printCurrentReceipt()" class="bg-blue-600 text-white px-4 py-2 rounded flex items-center gap-2">
        <span>&#128424;</span> Print Receipt
      </button>
    </div>
  </div>
</div>
