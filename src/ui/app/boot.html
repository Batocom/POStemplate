<script>

window.onload = async () => {

  // Initialize UI service for responsive behavior
  UIService.init();

  // Initialize pricing service to fetch tax rate early
  try {
    await PricingService.init();
    console.log("PricingService initialized with tax rate:", PricingService.getTaxRate() + "%");
  } catch (error) {
    console.error("Failed to initialize PricingService:", error);
    // Don't show error toast, just use 0%
    PricingService._taxRate = 0;
  }

  if (State.token) {

    Router.go("dashboard");

  } else {

    Router.go("login");

  }

};

function logout() {

  localStorage.removeItem("token");

  State.token = null;

  State.user = null;

  Router.go("login");

}

</script>
