<script>

window.api = function(action, payload = {}) {

  const token = sessionStorage.getItem('token');

  return new Promise((resolve, reject) => {

    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject)
      .handleRequest(action, {
        ...payload,
        token: token
      });

  });

};

</script>
