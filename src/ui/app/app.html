<script>

function renderAppShell(content) {

  document.getElementById("app").innerHTML = `

    <div class="flex h-screen overflow-hidden">

      <!-- SIDEBAR -->
      <aside class="w-64 bg-gray-900 text-white hidden md:block">

        ${renderSidebar()}

      </aside>

      <!-- MAIN -->
      <div class="flex-1 flex flex-col">

        ${renderTopbar()}

        <main class="flex-1 overflow-y-auto p-4">

          ${content}

        </main>

      </div>

    </div>

  `;
}

</script>

<script>

function renderProductsPage() {
  console.log('renderProductsPage called');
  const template = document.getElementById('productsPageTemplate');
  console.log('Template found:', template);
  if (template) {
    renderAppShell(template.innerHTML);
    loadProducts();
  } else {
    console.error('Products template not found');
    renderAppShell('<div class="text-red-500">Error loading products page</div>');
  }
}

async function loadProducts() {

  const container = document.getElementById(
    'productsTableContainer'
  );

  container.innerHTML = 'Loading...';

  try {

    const raw = await api('GET_PRODUCTS');

    const response = typeof raw === 'string' ? JSON.parse(raw) : raw;

    if (!response || !response.success) {
      container.innerHTML = `
        <div class="text-red-500">
          Failed to load products
        </div>
      `;
      return;
    }

    const products = response.data;

    if (!Array.isArray(products)) {
      container.innerHTML = `
        <div class="text-red-500">
          Invalid products data
        </div>
      `;
      return;
    }

    renderProductsTable(products);

  } catch (error) {

    console.error(error);

    container.innerHTML = `
      <div class="text-red-500">
        Something went wrong
      </div>
    `;

  }

}

function renderProductsTable(products) {
  const container = document.getElementById('productsTableContainer');

  if (!products.length) {
    container.innerHTML = `
      <div class="text-gray-500">No products found</div>
    `;
    return;
  }

  container.innerHTML = `
    <div class="mb-4">
      <button id="bulkDeleteBtn" onclick="bulkDeleteProducts()" class="bg-red-600 text-white px-4 py-2 rounded disabled:opacity-50" disabled>
        Delete Selected
      </button>
    </div>
    <table class="w-full text-left">
      <thead>
        <tr class="border-b">
          <th class="py-2">
            <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this.checked)" />
          </th>
          <th class="py-2">Product</th>
          <th class="py-2">Unit</th>
          <th class="py-2">Stock</th>
          <th class="py-2">Buy Price</th>
          <th class="py-2">Sell Price</th>
          <th class="py-2">Status</th>
          <th class="py-2">Actions</th>
        </tr>
      </thead>
      <tbody>
        ${products.map(product => {
          const stock = Number(product.stock);
          let statusClass = 'bg-red-100 text-red-800';
          let statusText = 'Out of Stock';
          if (stock > 10) {
            statusClass = 'bg-green-100 text-green-800';
            statusText = 'In Stock';
          } else if (stock > 0) {
            statusClass = 'bg-yellow-100 text-yellow-800';
            statusText = 'Low Stock';
          }

          return `
            <tr class="border-b">
              <td class="py-2">
                <input type="checkbox" class="product-checkbox" value="${product.id}" onchange="updateBulkDeleteButton()" />
              </td>
              <td class="py-2">${product.name}</td>
              <td class="py-2">${product.unit_id || '-'}</td>
              <td class="py-2">${stock}</td>
              <td class="py-2">KES ${Number(product.buy_price).toFixed(2)}</td>
              <td class="py-2">KES ${Number(product.sell_price).toFixed(2)}</td>
              <td class="py-2">
                <span class="px-2 py-1 rounded text-sm ${statusClass}">
                  ${statusText}
                </span>
              </td>
              <td class="py-2">
                <button class="text-blue-600 mr-2" onclick="editProduct('${product.id}')">Edit</button>
                <button class="text-red-600" onclick="deleteProduct('${product.id}')">Delete</button>
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

function toggleSelectAll(checked) {
  document.querySelectorAll('.product-checkbox').forEach(cb => cb.checked = checked);
  updateBulkDeleteButton();
}

function updateBulkDeleteButton() {
  const checked = document.querySelectorAll('.product-checkbox:checked').length;
  const btn = document.getElementById('bulkDeleteBtn');
  if (btn) {
    btn.disabled = checked === 0;
  }
}

async function bulkDeleteProducts() {
  const checked = document.querySelectorAll('.product-checkbox:checked');
  if (checked.length === 0) return;
  if (!confirm(`Delete ${checked.length} product(s)?`)) return;

  const ids = Array.from(checked).map(cb => cb.value);
  const btn = document.getElementById('bulkDeleteBtn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = 'Deleting...';
  }

  try {
    for (const id of ids) {
      const raw = await api('DELETE_PRODUCT', { productId: id });
      const response = typeof raw === "string" ? JSON.parse(raw) : raw;
      if (!response.success) {
        Toast.error(`Failed to delete product ${id}: ${response.error || 'Unknown error'}`);
      }
    }
    Toast.success(`Deleted ${ids.length} product(s)`);
    await loadProducts();
  } catch (err) {
    Toast.error('Error during bulk delete: ' + err.message);
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = 'Delete Selected';
    }
  }
}

function editProduct(id) {

  alert('Edit product: ' + id);

}

async function deleteProduct(id) {
  const confirmed = await Modal.confirm('Are you sure you want to delete this product?');
  if (!confirmed) return;

  const raw = await api('DELETE_PRODUCT', { productId: id });
  const response = typeof raw === "string" ? JSON.parse(raw) : raw;

  if (!response.success) {
    Toast.error(response.error || "Failed to delete product");
    return;
  }

  Toast.success('Product deleted successfully');
  await loadProducts();
}



</script>
