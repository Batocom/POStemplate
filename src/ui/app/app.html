<script>

function renderAppShell(content) {

  document.getElementById("app").innerHTML = `

    <div class="flex h-screen overflow-hidden">

      <!-- SIDEBAR -->
      <aside class="w-64 bg-gray-900 text-white hidden md:block">

        ${renderSidebar()}

      </aside>

      <!-- MAIN -->
      <div class="flex-1 flex flex-col">

        ${renderTopbar()}

        <main class="flex-1 overflow-y-auto p-4">

          ${content}

        </main>

      </div>

    </div>

  `;
}

</script>

<script>

function renderProductsPage() {
  console.log('renderProductsPage called');
  const template = document.getElementById('productsPageTemplate');
  console.log('Template found:', template);
  if (template) {
    renderAppShell(template.innerHTML);
    loadProducts();
  } else {
    console.error('Products template not found');
    renderAppShell('<div class="text-red-500">Error loading products page</div>');
  }
}

async function loadProducts() {

  const container = document.getElementById(
    'productsTableContainer'
  );

  container.innerHTML = 'Loading...';

  try {

    const response = await api('GET_PRODUCTS');
    console.log('Products response:', response);

    if (!response || !response.success) {
      container.innerHTML = `
        <div class="text-red-500">
          Failed to load products
        </div>
      `;
      return;
    }

    const products = response.data;

    if (!Array.isArray(products)) {
      container.innerHTML = `
        <div class="text-red-500">
          Invalid products data
        </div>
      `;
      return;
    }

    renderProductsTable(products);

  } catch (error) {

    console.error(error);

    container.innerHTML = `
      <div class="text-red-500">
        Something went wrong
      </div>
    `;

  }

}

function renderProductsTable(products) {

  const container = document.getElementById(
    'productsTableContainer'
  );

  if (!products.length) {

    container.innerHTML = `
      <div class="text-gray-500">
        No products found
      </div>
    `;

    return;

  }

  container.innerHTML = `
    <table class="w-full text-left">

      <thead>

        <tr class="border-b">

          <th class="py-2">Name</th>
          <th class="py-2">Stock</th>
          <th class="py-2">Sell Price</th>
          <th class="py-2">Actions</th>

        </tr>

      </thead>

      <tbody>

        ${products.map(product => `

          <tr class="border-b">

            <td class="py-2">
              ${product.name}
            </td>

            <td class="py-2">
              ${product.stock}
            </td>

            <td class="py-2">
              KES ${product.sell_price}
            </td>

            <td class="py-2">

              <button
                class="text-blue-600"
                onclick="editProduct('${product.id}')"
              >
                Edit
              </button>

            </td>

          </tr>

        `).join('')}

      </tbody>

    </table>
  `;

}

function editProduct(id) {

  alert('Edit product: ' + id);

}

function openCreateProductModal() {

  alert('Create Product Modal Coming Next');

}

async function testApiFetch() {
  console.log('TEST: Starting API fetch test');
  
  try {
    const result = await api('TEST_FETCH');
    console.log('TEST: Raw result:', result);
    console.log('TEST: Type of result:', typeof result);
    
    if (typeof result === 'string') {
      try {
        const parsed = JSON.parse(result);
        console.log('TEST: Parsed result:', parsed);
        console.log('TEST: Is array:', Array.isArray(parsed));
        console.log('TEST: Length:', parsed.length);
      } catch (e) {
        console.log('TEST: Not JSON string, raw value:', result);
      }
    }
    
    alert('Test complete. Check console logs.');
  } catch (error) {
    console.error('TEST: Error:', error);
    alert('Test failed: ' + error.message);
  }
}

</script>
