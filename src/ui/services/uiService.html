<script>
/**
 * UIService - UI state management and responsive behavior
 * 
 * Single source of truth for:
 * - sidebar open/closed state
 * - mobile/desktop detection
 * - responsive layout management
 */
const UIService = (function() {
  const MOBILE_BREAKPOINT = 768; // Mirror of CSS token --bp-tablet. Must remain synchronized.
  
  let state = {
    sidebarOpen: false,
    isMobile: window.innerWidth < MOBILE_BREAKPOINT
  };
  
  function updateSidebarDOM(open) {
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.querySelector('.sidebar-overlay');
    
    // Guard: sidebar may not exist yet if called before renderAppShell
    if (!sidebar) {
      console.warn('UIService: sidebar element not found in DOM');
      return;
    }
    
    sidebar.classList.toggle('sidebar--open', open);
    
    if (overlay) {
      overlay.classList.toggle('sidebar-overlay--visible', open);
    }
    
    document.body.style.overflow = open ? 'hidden' : '';
  }
  
  function handleResize() {
    const wasMobile = state.isMobile;
    state.isMobile = window.innerWidth < MOBILE_BREAKPOINT;
    
    // If we just resized to desktop, close mobile sidebar
    if (wasMobile && !state.isMobile) {
      closeSidebar();
    }
  }
  
  function init() {
    window.addEventListener('resize', handleResize);
    
    // Close sidebar on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeSidebar();
      }
    });
    
    // Log sidebar state for debugging
    console.log('UIService initialized');
    
    // Check for sidebar after a short delay to allow DOM to be rendered
    setTimeout(function() {
      const sidebar = document.querySelector('.sidebar');
      const hamburger = document.getElementById('hamburgerBtn');
      console.log('Sidebar element:', sidebar);
      console.log('Hamburger button:', hamburger);
      
      if (!sidebar) {
        console.warn('UIService: sidebar not found after init. Will retry on toggle.');
      }
    }, 500);
  }
  
  function toggleSidebar() {
    state.sidebarOpen = !state.sidebarOpen;
    updateSidebarDOM(state.sidebarOpen);
  }
  
  function openSidebar() {
    state.sidebarOpen = true;
    updateSidebarDOM(true);
  }
  
  function closeSidebar() {
    state.sidebarOpen = false;
    updateSidebarDOM(false);
  }
  
  function isMobile() {
    return state.isMobile;
  }
  
  function isSidebarOpen() {
    return state.sidebarOpen;
  }
  
  return {
    init: init,
    toggleSidebar: toggleSidebar,
    openSidebar: openSidebar,
    closeSidebar: closeSidebar,
    isMobile: isMobile,
    isSidebarOpen: isSidebarOpen
  };
})();
</script>
