<script>
/**
 * ToastService - Reusable notification system
 * Pattern: NT-01 — Toast Notification
 * Styling: components/toast.html
 */
const Toast = (function() {
  const DURATION = 3000;
  const ANIMATION_DURATION = 300;
  
  const ICONS = {
    success: '✓',
    error: '✕',
    warning: '⚠',
    info: 'ℹ'
  };
  
  function getContainer() {
    let container = document.getElementById('toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toast-container';
      container.className = 'toast-container';
      document.body.appendChild(container);
    }
    return container;
  }
  
  function createToast(message, type) {
    const toast = document.createElement('div');
    toast.className = 'toast toast--' + type;
    
    const icon = document.createElement('span');
    icon.className = 'toast__icon';
    icon.textContent = ICONS[type] || ICONS.info;
    
    const msg = document.createElement('span');
    msg.className = 'toast__message';
    msg.textContent = message;
    
    toast.appendChild(icon);
    toast.appendChild(msg);
    
    return toast;
  }
  
  function show(message, type) {
    const container = getContainer();
    const toast = createToast(message, type);
    container.appendChild(toast);
    
    setTimeout(function() {
      toast.classList.add('toast--closing');
      setTimeout(function() {
        if (toast.parentNode) {
          toast.parentNode.removeChild(toast);
        }
        // Remove container if empty
        if (container.children.length === 0) {
          container.parentNode.removeChild(container);
        }
      }, ANIMATION_DURATION);
    }, DURATION);
  }
  
  return {
    success: function(message) { show(message, 'success'); },
    error: function(message) { show(message, 'error'); },
    warning: function(message) { show(message, 'warning'); },
    info: function(message) { show(message, 'info'); }
  };
})();
</script>
