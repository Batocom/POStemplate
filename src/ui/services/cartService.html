<script>
/**
 * CartService — Business logic for cart operations
 * 
 * Handles:
 * - add item
 * - remove item
 * - merge quantities
 * - update qty
 * - clear cart
 * - trigger recalculation
 * 
 * Does NOT:
 * - touch DOM
 * - render HTML
 * - call modals
 */
const CartService = {
  
  /**
   * Add product to cart
   * If product exists, increase quantity
   * If product doesn't exist, add new line
   */
  add(product, quantity = 1) {
    if (!product || !product.id) {
      throw new Error("Invalid product");
    }
    
    const existingItem = CartState.getItem(product.id);
    
    if (existingItem) {
      existingItem.quantity += quantity;
      existingItem.total = existingItem.quantity * existingItem.price;
    } else {
      CartState.items.push({
        productId: product.id,
        name: product.name,
        barcode: product.barcode || "",
        price: Number(product.sell_price) || 0,
        buyPrice: Number(product.buy_price) || 0,
        quantity: quantity,
        total: quantity * (Number(product.sell_price) || 0),
        stock: Number(product.stock) || 0,
        unit: product.unit || "pcs"
      });
    }
    
    CartState.status = "active";
    PricingService.recalculate();
    EventBus.emit("cartUpdated");
  },
  
  /**
   * Remove item from cart by product ID
   */
  remove(productId) {
    CartState.items = CartState.items.filter(item => item.productId !== productId);
    
    if (CartState.items.length === 0) {
      CartState.status = "idle";
    }
    
    PricingService.recalculate();
    EventBus.emit("cartUpdated");
  },
  
  /**
   * Update item quantity
   */
  updateQuantity(productId, quantity) {
    const item = CartState.getItem(productId);
    
    if (!item) {
      throw new Error("Item not found in cart");
    }
    
    quantity = Number(quantity);
    
    if (quantity <= 0) {
      this.remove(productId);
      return;
    }
    
    if (quantity > item.stock) {
      Toast.warning("Insufficient stock. Available: " + item.stock);
      quantity = item.stock;
    }
    
    item.quantity = quantity;
    item.total = quantity * item.price;
    
    PricingService.recalculate();
    EventBus.emit("cartUpdated");
  },
  
  /**
   * Clear entire cart
   */
  clear() {
    CartState.reset();
    EventBus.emit("cartCleared");
  },
  
  /**
   * Set customer for this sale
   */
  setCustomer(customer) {
    CartState.customer = customer;
    EventBus.emit("customerChanged");
  },
  
  /**
   * Validate cart before checkout
   */
  validate() {
    if (!CartState.hasItems()) {
      throw new Error("Cart is empty");
    }
    
    CartState.items.forEach(item => {
      if (item.quantity <= 0) {
        throw new Error(`Invalid quantity for ${item.name}`);
      }
      if (item.price <= 0) {
        throw new Error(`Invalid price for ${item.name}`);
      }
    });
    
    return true;
  }
};
</script>
