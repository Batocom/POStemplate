<script>
/**
 * PaymentMethodRegistry — Registry for payment method handlers
 * 
 * Each handler must implement:
 * - id: string
 * - label: string
 * - icon: string (emoji)
 * - renderSection(): returns HTML string for the method-specific section
 * - onSelect(): called when method is selected
 * - validate(): returns boolean
 * - getPaymentData(): returns { method, amountPaid, ... }
 */
const PaymentMethodRegistry = {
  _methods: {},
  
  register(id, handler) {
    this._methods[id] = handler;
  },
  
  get(id) {
    return this._methods[id] || null;
  },
  
  getAll() {
    return Object.values(this._methods);
  },
  
  getIds() {
    return Object.keys(this._methods);
  }
};
</script>
