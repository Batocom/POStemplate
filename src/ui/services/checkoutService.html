<script>
/**
 * CheckoutService — Connects frontend to backend
 * 
 * This is where CREATE_SALE gets called.
 * 
 * Flow:
 * 1. Validate cart
 * 2. Prepare payload
 * 3. API.request("CREATE_SALE")
 * 4. Success → receipt → clear cart
 */
const CheckoutService = {
  
  /**
   * Process checkout
   */
  async process(paymentData) {
    try {
      // Validate cart
      CartService.validate();
      
      // Update payment info
      if (paymentData) {
        CartState.payment.method = paymentData.method || "cash";
        CartState.payment.amountPaid = Number(paymentData.amountPaid) || 0;
      }
      
      CartState.status = "paying";
      EventBus.emit("checkoutStarted");
      
      // Prepare payload for backend
      const payload = this._preparePayload();
      
      // Send to backend
      const raw = await api("CREATE_SALE", payload);
      const response = typeof raw === "string" ? JSON.parse(raw) : raw;
      
      if (!response.success) {
        throw new Error(response.error || "Checkout failed");
      }
      
      const saleData = response.data;
      
      // Show success toast
      Toast.success("Sale completed successfully!");

      CartState.status = "completed";

      // Mark the flag ON saleData itself so the return value carries it.
      // confirm() checks saleResult._saleCompletedEmitted to avoid a
      // second emit — it must see the flag on the returned object.
      saleData._saleCompletedEmitted = true;

      // Emit BEFORE clearing the cart so the controller's saleCompleted
      // listener can still read CartState.items for the receipt table.
      // DO NOT call Modal.open() or ReceiptService.show() here — opening
      // a modal while the payment overlay is active causes modalService's
      // removeExisting() to destroy #paymentModalContent without running
      // its onClose, orphaning the node and breaking every subsequent sale.
      EventBus.emit("saleCompleted", saleData);

      // Clear cart after the event so receipt population has cart data
      CartService.clear();

      return saleData;
      
    } catch (error) {
      CartState.status = "active";
      Toast.error(error.message || "Checkout failed");
      EventBus.emit("checkoutFailed", error);
      throw error;
    }
  },
  
  /**
   * Prepare payload for backend
   */
  _preparePayload() {
    const items = CartState.items.map(item => ({
      product_id: item.productId,
      name: item.name,
      quantity: item.quantity,
      price: item.price,
      total: item.total
    }));
    
    // Get customer ID from payment data if credit method
    let customerId = CartState.customer ? CartState.customer.id : null;
    if (CartState.payment.method === 'credit') {
      const customerSelect = document.getElementById("credit-customer-select");
      if (customerSelect && customerSelect.value) {
        customerId = customerSelect.value;
      }
    }
    
    // Get credit notes if applicable
    let notes = '';
    if (CartState.payment.method === 'credit') {
      const notesInput = document.getElementById("credit-notes");
      if (notesInput) {
        notes = notesInput.value;
      }
    }
    
    return {
      items: items,
      subtotal: CartState.summary.subtotal,
      tax: CartState.summary.tax,
      discount: CartState.summary.discount,
      total: CartState.summary.total,
      payment_method: CartState.payment.method,
      amount_paid: CartState.payment.amountPaid,
      customer_id: customerId,
      notes: notes,
      is_credit: CartState.payment.method === 'credit'
    };
  },
  
  /**
   * Show receipt
   */
  async _showReceipt(saleId) {
    try {
      const raw = await api("PRINT_RECEIPT", { saleId });
      const response = typeof raw === "string" ? JSON.parse(raw) : raw;
      
      if (response.success && response.data) {
        // Show receipt in modal
        Modal.open({
          title: "Receipt",
          content: `<pre style="font-family: monospace; white-space: pre-wrap;">${response.data}</pre>`,
          size: "md"
        });
      }
    } catch (error) {
      console.error("Receipt generation failed:", error);
    }
  },
  
  /**
   * Show receipt modal with print option after sale
   * This is called after a successful sale to display the receipt
   * Delegates to ReceiptService for consistency
   */
  async _showReceiptModal(saleId) {
    await ReceiptService.show(saleId);
  },
  
  /**
   * Calculate change
   */
  calculateChange(amountPaid) {
    const total = CartState.summary.total;
    amountPaid = Number(amountPaid) || 0;
    
    if (amountPaid >= total) {
      return amountPaid - total;
    }
    
    return 0;
  }
};
</script>
