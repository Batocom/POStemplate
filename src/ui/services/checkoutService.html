<script>
/**
 * CheckoutService — Connects frontend to backend
 * 
 * This is where CREATE_SALE gets called.
 * 
 * Flow:
 * 1. Validate cart
 * 2. Prepare payload
 * 3. API.request("CREATE_SALE")
 * 4. Success → receipt → clear cart
 */
const CheckoutService = {
  
  /**
   * Process checkout
   */
  async process(paymentData) {
    try {
      // Validate cart
      CartService.validate();
      
      // Update payment info
      if (paymentData) {
        CartState.payment.method = paymentData.method || "cash";
        CartState.payment.amountPaid = Number(paymentData.amountPaid) || 0;
      }
      
      CartState.status = "paying";
      EventBus.emit("checkoutStarted");
      
      // Prepare payload for backend
      const payload = this._preparePayload();
      
      // Send to backend
      const raw = await api("CREATE_SALE", payload);
      const response = typeof raw === "string" ? JSON.parse(raw) : raw;
      
      if (!response.success) {
        throw new Error(response.error || "Checkout failed");
      }
      
      const saleData = response.data;
      
      // Show success
      Toast.success("Sale completed successfully!");
      
      // Show receipt modal with print option (this replaces the old text receipt)
      if (saleData && saleData.saleId) {
        await this._showReceiptModal(saleData.saleId);
      }
      
      // Clear cart
      CartService.clear();
      
      CartState.status = "completed";
      EventBus.emit("saleCompleted", saleData);
      
      return saleData;
      
    } catch (error) {
      CartState.status = "active";
      Toast.error(error.message || "Checkout failed");
      EventBus.emit("checkoutFailed", error);
      throw error;
    }
  },
  
  /**
   * Prepare payload for backend
   */
  _preparePayload() {
    const items = CartState.items.map(item => ({
      product_id: item.productId,
      name: item.name,
      quantity: item.quantity,
      price: item.price,
      total: item.total
    }));
    
    // Get customer ID from payment data if credit method
    let customerId = CartState.customer ? CartState.customer.id : null;
    if (CartState.payment.method === 'credit') {
      const customerSelect = document.getElementById("credit-customer-select");
      if (customerSelect && customerSelect.value) {
        customerId = customerSelect.value;
      }
    }
    
    // Get credit notes if applicable
    let notes = '';
    if (CartState.payment.method === 'credit') {
      const notesInput = document.getElementById("credit-notes");
      if (notesInput) {
        notes = notesInput.value;
      }
    }
    
    return {
      items: items,
      subtotal: CartState.summary.subtotal,
      tax: CartState.summary.tax,
      discount: CartState.summary.discount,
      total: CartState.summary.total,
      payment_method: CartState.payment.method,
      amount_paid: CartState.payment.amountPaid,
      customer_id: customerId,
      notes: notes,
      is_credit: CartState.payment.method === 'credit'
    };
  },
  
  /**
   * Show receipt
   */
  async _showReceipt(saleId) {
    try {
      const raw = await api("PRINT_RECEIPT", { saleId });
      const response = typeof raw === "string" ? JSON.parse(raw) : raw;
      
      if (response.success && response.data) {
        // Show receipt in modal
        Modal.open({
          title: "Receipt",
          content: `<pre style="font-family: monospace; white-space: pre-wrap;">${response.data}</pre>`,
          size: "md"
        });
      }
    } catch (error) {
      console.error("Receipt generation failed:", error);
    }
  },
  
  /**
   * Show receipt modal with print option after sale
   * This is called after a successful sale to display the receipt
   */
  async _showReceiptModal(saleId) {
    try {
      // Fetch sale details and products for the receipt modal
      const [saleRaw, productsRaw] = await Promise.all([
        api("GET_SALE_BY_ID", { saleId }),
        api("GET_PRODUCTS")
      ]);
      
      const response = typeof saleRaw === "string" ? JSON.parse(saleRaw) : saleRaw;
      const productsResponse = typeof productsRaw === "string" ? JSON.parse(productsRaw) : productsRaw;
      
      // Build product name lookup
      const productMap = {};
      if (productsResponse.success && Array.isArray(productsResponse.data)) {
        productsResponse.data.forEach(function(p) {
          productMap[p.id] = p.name;
        });
      }
      
      if (response.success) {
        const { sale, items } = response.data;
        
        // Store receipt data for printing
        window._currentReceiptData = {
          sale: sale,
          items: items,
          productMap: productMap
        };
        
        // Populate modal with sale details
        const invoiceEl = document.getElementById("modal-invoice");
        const customerEl = document.getElementById("modal-customer");
        const dateEl = document.getElementById("modal-date");
        const paymentEl = document.getElementById("modal-payment");
        const totalEl = document.getElementById("modal-total");
        const itemsBody = document.getElementById("modal-items-body");
        
        if (invoiceEl) invoiceEl.textContent = sale.invoice_no;
        if (customerEl) customerEl.textContent = sale.customer_name || 'Walk-in';
        if (dateEl) dateEl.textContent = new Date(sale.created_at).toLocaleDateString();
        if (paymentEl) paymentEl.textContent = sale.payment_method;
        if (totalEl) totalEl.textContent = "KES " + Number(sale.total_amount).toFixed(2);
        
        // Render items with product names
        if (itemsBody) {
          itemsBody.innerHTML = items.map(function(item) {
            const productName = productMap[item.product_id] || item.product_id;
            return '<tr>' +
              '<td>' + productName + '</td>' +
              '<td>' + item.quantity + '</td>' +
              '<td>KES ' + Number(item.price).toFixed(2) + '</td>' +
              '<td>KES ' + Number(item.subtotal).toFixed(2) + '</td>' +
            '</tr>';
          }).join("");
        }
        
        // Close the payment modal first
        Modal.close();
        
        // Small delay to ensure payment modal is closed
        await new Promise(resolve => setTimeout(resolve, 200));
        
        // Show the receipt modal
        Modal.open({
          title: "Sale Complete - " + sale.invoice_no,
          content: document.getElementById("salesModalContent").innerHTML,
          size: "lg"
        });
      } else {
        // Fallback: show simple success message
        Modal.close();
        Toast.success("Sale completed successfully!");
      }
    } catch (error) {
      console.error("Receipt modal display failed:", error);
      // Fallback: show simple success message
      Modal.close();
      Toast.success("Sale completed successfully!");
    }
  },
  
  /**
   * Calculate change
   */
  calculateChange(amountPaid) {
    const total = CartState.summary.total;
    amountPaid = Number(amountPaid) || 0;
    
    if (amountPaid >= total) {
      return amountPaid - total;
    }
    
    return 0;
  }
};
</script>
