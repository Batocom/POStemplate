<style>
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9998;
    animation: modalFadeIn 200ms ease-out;
    padding: 16px;
  }
  
  .modal-overlay.closing {
    animation: modalFadeOut 200ms ease-in;
  }
  
  .modal-content {
    background: white;
    border-radius: 12px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalSlideIn 200ms ease-out;
    max-width: 560px;
  }
  
  .modal-content.closing {
    animation: modalSlideOut 200ms ease-in;
  }
  
  .modal-content.sm {
    max-width: 400px;
  }
  
  .modal-content.lg {
    max-width: 720px;
  }
  
  .modal-content.xl {
    max-width: 960px;
  }
  
  .modal-content.full {
    max-width: calc(100% - 32px);
  }
  
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid #e5e7eb;
  }
  
  .modal-header h2 {
    font-size: 1.25rem;
    font-weight: 700;
    margin: 0;
    color: #1f2937;
  }
  
  .modal-close-btn {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: #6b7280;
    padding: 4px 8px;
    border-radius: 4px;
    line-height: 1;
  }
  
  .modal-close-btn:hover {
    background: #f3f4f6;
    color: #374151;
  }
  
  .modal-body {
    padding: 24px;
  }
  
  .modal-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    gap: 16px;
  }
  
  .modal-spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e5e7eb;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: modalSpin 0.8s linear infinite;
  }
  
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 16px 24px;
    border-top: 1px solid #e5e7eb;
    flex-wrap: wrap;
  }
  
  .modal-btn {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: background 0.15s;
  }
  
  .modal-btn-primary {
    background: #2563eb;
    color: white;
  }
  
  .modal-btn-primary:hover {
    background: #1d4ed8;
  }
  
  .modal-btn-secondary {
    background: #f3f4f6;
    color: #374151;
  }
  
  .modal-btn-secondary:hover {
    background: #e5e7eb;
  }
  
  .modal-btn-danger {
    background: #ef4444;
    color: white;
  }
  
  .modal-btn-danger:hover {
    background: #dc2626;
  }
  
  @keyframes modalFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  @keyframes modalFadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
  
  @keyframes modalSlideIn {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  
  @keyframes modalSlideOut {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-20px); opacity: 0; }
  }
  
  @keyframes modalSpin {
    to { transform: rotate(360deg); }
  }
  
  @media (max-width: 768px) {
    .modal-overlay {
      padding: 12px;
    }
    
    .modal-content {
      max-width: 100% !important;
      border-radius: 8px;
    }
    
    .modal-header {
      padding: 12px 16px;
    }
    
    .modal-header h2 {
      font-size: 1.1rem;
    }
    
    .modal-body {
      padding: 16px;
    }
    
    .modal-actions {
      padding: 12px 16px;
    }
    
    .modal-btn {
      padding: 10px 16px;
      font-size: 0.9rem;
      flex: 1;
      text-align: center;
    }
  }
  
  @media (max-width: 480px) {
    .modal-overlay {
      padding: 8px;
    }
    
    .modal-header {
      padding: 10px 12px;
    }
    
    .modal-body {
      padding: 12px;
    }
    
    .modal-actions {
      padding: 10px 12px;
      flex-direction: column;
    }
    
    .modal-btn {
      width: 100%;
    }
  }
</style>

<script>
/**
 * ModalService - Reusable popup system
 * 
 * API:
 *   Modal.open({ title, content, size, closable, onClose })
 *   Modal.close()
 *   Modal.confirm(message) => Promise<boolean>
 *   Modal.alert(message)
 *   Modal.loading(message)
 *   Modal.setLoading(state)
 */
const Modal = (function() {
  const ANIMATION_DURATION = 200;
  
  const SIZES = {
    sm: 'sm',
    md: '',
    lg: 'lg',
    xl: 'xl',
    full: 'full'
  };
  
  let currentOptions = null;
  let onCloseCallback = null;
  
  function ensureStyles() {
    if (document.getElementById('modal-service-styles')) return;
    const style = document.createElement('style');
    style.id = 'modal-service-styles';
    style.textContent = `
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9998;
        animation: modalFadeIn ${ANIMATION_DURATION}ms ease-out;
        padding: 16px;
      }
      .modal-overlay.closing {
        animation: modalFadeOut ${ANIMATION_DURATION}ms ease-in;
      }
      .modal-content {
        background: white;
        border-radius: 12px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        animation: modalSlideIn ${ANIMATION_DURATION}ms ease-out;
        max-width: 560px;
      }
      .modal-content.closing {
        animation: modalSlideOut ${ANIMATION_DURATION}ms ease-in;
      }
      .modal-content.sm { max-width: 400px; }
      .modal-content.lg { max-width: 720px; }
      .modal-content.xl { max-width: 960px; }
      .modal-content.full { max-width: calc(100% - 32px); }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        border-bottom: 1px solid #e5e7eb;
      }
      .modal-header h2 {
        font-size: 1.25rem;
        font-weight: 700;
        margin: 0;
        color: #1f2937;
      }
      .modal-close-btn {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #6b7280;
        padding: 4px 8px;
        border-radius: 4px;
        line-height: 1;
      }
      .modal-close-btn:hover {
        background: #f3f4f6;
        color: #374151;
      }
      .modal-body { padding: 24px; }
      .modal-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
        gap: 16px;
      }
      .modal-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e5e7eb;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: modalSpin 0.8s linear infinite;
      }
      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 16px 24px;
        border-top: 1px solid #e5e7eb;
        flex-wrap: wrap;
      }
      .modal-btn {
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: background 0.15s;
      }
      .modal-btn-primary { background: #2563eb; color: white; }
      .modal-btn-primary:hover { background: #1d4ed8; }
      .modal-btn-secondary { background: #f3f4f6; color: #374151; }
      .modal-btn-secondary:hover { background: #e5e7eb; }
      .modal-btn-danger { background: #ef4444; color: white; }
      .modal-btn-danger:hover { background: #dc2626; }
      @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes modalFadeOut { from { opacity: 1; } to { opacity: 0; } }
      @keyframes modalSlideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      @keyframes modalSlideOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-20px); opacity: 0; } }
      @keyframes modalSpin { to { transform: rotate(360deg); } }
      @media (max-width: 768px) {
        .modal-overlay { padding: 12px; }
        .modal-content { max-width: 100% !important; border-radius: 8px; }
        .modal-header { padding: 12px 16px; }
        .modal-header h2 { font-size: 1.1rem; }
        .modal-body { padding: 16px; }
        .modal-actions { padding: 12px 16px; }
        .modal-btn { padding: 10px 16px; font-size: 0.9rem; flex: 1; text-align: center; }
      }
      @media (max-width: 480px) {
        .modal-overlay { padding: 8px; }
        .modal-header { padding: 10px 12px; }
        .modal-body { padding: 12px; }
        .modal-actions { padding: 10px 12px; flex-direction: column; }
        .modal-btn { width: 100%; }
      }
    `;
    document.head.appendChild(style);
  }
  
  function createOverlay() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modal-overlay';
    return overlay;
  }
  
  function createContent(options) {
    const sizeClass = SIZES[options.size] || '';
    
    const content = document.createElement('div');
    content.className = `modal-content ${sizeClass}`;
    content.id = 'modal-content';
    
    // Header
    if (options.title || options.closable !== false) {
      const header = document.createElement('div');
      header.className = 'modal-header';
      
      const title = document.createElement('h2');
      title.textContent = options.title || '';
      header.appendChild(title);
      
      if (options.closable !== false) {
        const closeBtn = document.createElement('button');
        closeBtn.className = 'modal-close-btn';
        closeBtn.innerHTML = '✕';
        closeBtn.onclick = function() { Modal.close(); };
        header.appendChild(closeBtn);
      }
      
      content.appendChild(header);
    }
    
    // Body
    const body = document.createElement('div');
    body.className = 'modal-body';
    body.id = 'modal-body';
    body.innerHTML = options.content || '';
    content.appendChild(body);
    
    return content;
  }
  
  function attachEvents(overlay, options) {
    // Close on outside click
    if (options.closeOnOutsideClick !== false) {
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) {
          Modal.close();
        }
      });
    }
    
    // Close on Escape
    if (options.closeOnEscape !== false) {
      function escapeHandler(e) {
        if (e.key === 'Escape') {
          Modal.close();
          document.removeEventListener('keydown', escapeHandler);
        }
      }
      document.addEventListener('keydown', escapeHandler);
    }
  }
  
  function removeExisting() {
    const existing = document.getElementById('modal-overlay');
    if (existing) existing.remove();
  }
  
  return {
    open: function(options) {
      // Normalize options
      if (typeof options === 'string') {
        options = { content: options };
      }
      
      currentOptions = Object.assign({
        title: '',
        content: '',
        size: 'md',
        closable: true,
        closeOnEscape: true,
        closeOnOutsideClick: true,
        onClose: null
      }, options);
      
      onCloseCallback = currentOptions.onClose || null;
      
      ensureStyles();
      removeExisting();
      
      const overlay = createOverlay();
      const content = createContent(currentOptions);
      
      overlay.appendChild(content);
      document.body.appendChild(overlay);
      attachEvents(overlay, currentOptions);
    },
    
    close: function() {
      const overlay = document.getElementById('modal-overlay');
      if (!overlay) return;
      
      const content = document.getElementById('modal-content');
      if (content) content.classList.add('closing');
      overlay.classList.add('closing');
      
      setTimeout(function() {
        overlay.remove();
        if (onCloseCallback) {
          onCloseCallback();
          onCloseCallback = null;
        }
        currentOptions = null;
      }, ANIMATION_DURATION);
    },
    
    confirm: function(message) {
      return new Promise(function(resolve) {
        const content = `
          <div class="text-center py-4">
            <p class="text-lg mb-6">${message}</p>
            <div class="modal-actions justify-center">
              <button onclick="Modal._confirmResolve(false)" class="modal-btn modal-btn-secondary">Cancel</button>
              <button onclick="Modal._confirmResolve(true)" class="modal-btn modal-btn-danger">Confirm</button>
            </div>
          </div>
        `;
        
        Modal._confirmResolve = function(result) {
          Modal.close();
          resolve(result);
        };
        
        Modal.open({
          title: 'Confirm',
          content: content,
          size: 'sm',
          closable: false,
          closeOnEscape: false,
          closeOnOutsideClick: false,
          onClose: function() {
            resolve(false);
          }
        });
      });
    },
    
    alert: function(message) {
      const content = `
        <div class="text-center py-4">
          <p class="text-lg mb-6">${message}</p>
          <button onclick="Modal.close()" class="modal-btn modal-btn-primary">OK</button>
        </div>
      `;
      
      Modal.open({
        title: 'Notice',
        content: content,
        size: 'sm',
        closable: false,
        closeOnEscape: false,
        closeOnOutsideClick: false
      });
    },
    
    loading: function(message) {
      const content = `
        <div class="modal-loading">
          <div class="modal-spinner"></div>
          <p class="text-gray-600">${message || 'Loading...'}</p>
        </div>
      `;
      
      Modal.open({
        title: '',
        content: content,
        size: 'sm',
        closable: false,
        closeOnEscape: false,
        closeOnOutsideClick: false
      });
    },
    
    setLoading: function(state) {
      const body = document.getElementById('modal-body');
      if (!body) return;
      
      if (state) {
        body.innerHTML = `
          <div class="modal-loading">
            <div class="modal-spinner"></div>
            <p class="text-gray-600">Processing...</p>
          </div>
        `;
      }
    }
  };
})();

// Backward compatibility
function openModal(content) {
  Modal.open({ content: content, size: 'lg' });
}

function closeModal() {
  Modal.close();
}
</script>
